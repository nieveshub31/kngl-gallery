<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNGL RP - Medya Galerisi</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- MODERN DARK TEMA VE GÜNCEL CSS --- */
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --card-bg: #151a22;
            --accent-color: #9d4edd;
            --accent-glow: #7b2cbf;
            --text-color: #c5c6c7;
            --text-muted: #66fcf1;
            --danger-color: #e63946;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #fff;
            text-shadow: 0 0 10px var(--accent-glow);
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .gallery-container {
            width: 100%;
            max-width: 1200px;
            background: var(--container-bg);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Yönetici Paneli & Kontroller */
        .controls-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-zone {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="password"], input[type="text"] {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--accent-color);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            transition: all 0.3s;
        }

        input[type="password"]:focus, input[type="text"]:focus {
            box-shadow: 0 0 8px var(--accent-glow);
        }

        button {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--accent-glow);
            box-shadow: 0 0 12px var(--accent-glow);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger-color);
        }
        .btn-danger:hover {
            background: #b71c1c;
            box-shadow: 0 0 12px var(--danger-color);
        }

        /* Galeri Grid Yapısı */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        /* Kart Tasarımı */
        .gallery-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.6), 0 0 15px rgba(157, 78, 221, 0.2);
        }

        /* Görsel Alanı ve Bulanık Başlama Efekti */
        .img-container {
            width: 100%;
            height: 200px;
            background: #0f1319;
            overflow: hidden;
            position: relative;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease, filter 0.5s ease;
            opacity: 0;
            filter: blur(10px);
        }

        .img-container img.loaded {
            opacity: 1;
            filter: blur(0);
        }

        /* Overlays ve Butonlar */
        .card-actions-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
            z-index: 2;
        }

        .card-action-btn {
            background: rgba(21, 26, 34, 0.85);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .card-action-btn svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        .card-select-checkbox {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            z-index: 2;
        }

        .delete-card-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: var(--danger-color);
            padding: 6px 10px;
            font-size: 12px;
            z-index: 2;
        }

        .card-tags-overlay {
            padding: 12px;
            background: var(--card-bg);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag-badge {
            background: rgba(157, 78, 221, 0.15);
            color: #e0aaff;
            border: 1px solid rgba(157, 78, 221, 0.3);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            text-transform: uppercase;
        }

        /* Sayfalama Kontrolleri */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .pagination-info {
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>KNGL RP MEDYA GALERİSİ</h1>

    <div class="gallery-container">
        <!-- Kontrol Barı -->
        <div class="controls-wrapper">
            <div class="search-zone">
                <input type="text" id="tagSearchInput" placeholder="Etiketlerde ara..." oninput="handleSearch()">
            </div>
            
            <div class="admin-zone">
                <input type="password" id="adminPasswordInput" placeholder="Yönetici Şifresi">
                <button id="loginBtn" onclick="toggleAdminMode()">Giriş Yap</button>
                <button id="bulkDeleteBtn" class="btn-danger" style="display: none;" onclick="handleBulkDelete()">Seçilenleri Sil</button>
            </div>
        </div>

        <!-- Galeri Grid Alanı -->
        <div id="galleryGrid" class="gallery-grid">
            <!-- Kartlar JavaScript ile buraya dolacak -->
        </div>

        <!-- Sayfalama -->
        <div class="pagination-container">
            <button id="prevPageBtn" onclick="changePage(-1)">Önceki</button>
            <span id="paginationInfo" class="pagination-info">Sayfa 1 / 1</span>
            <button id="nextPageBtn" onclick="changePage(1)">Sonraki</button>
        </div>
    </div>

    <script>
        // --- SUPABASE BAĞLANTISI VE AKILLI AYARLAR ---
        const SUPABASE_URL = "BURAYA_SUPABASE_URL_ADRESINIZI_YAZIN"; 
        const SUPABASE_ANON_KEY = "BURAYA_SUPABASE_ANON_KEY_DEGERINIZI_YAZIN";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let galleryItems = [];
        let filteredItems = [];
        let isAdminActive = false;
        
        // Sayfalama Değişkenleri
        let currentPage = 1;
        const itemsPerPage = 12;

        // Sayfa Açıldığında Verileri Çek
        document.addEventListener("DOMContentLoaded", () => {
            fetchGalleryData();
        });

        async function fetchGalleryData() {
            try {
                // Supabase tablonuzun adının 'gallery' olduğunu varsayıyoruz
                const { data, error } = await _supabase
                    .from('gallery')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                galleryItems = data || [];
                filteredItems = [...galleryItems];
                refreshGalleryUI();
            } catch (err) {
                console.error("Veri çekilirken hata oluştu:", err.message);
            }
        }

        // Arama Motoru
        function handleSearch() {
            const query = document.getElementById("tagSearchInput").value.toLowerCase().trim();
            if (!query) {
                filteredItems = [...galleryItems];
            } else {
                filteredItems = galleryItems.filter(item => {
                    if (!item.tags) return false;
                    // Etiket dizisi veya string kontrolü
                    const tagsString = Array.isArray(item.tags) ? item.tags.join(' ') : String(item.tags);
                    return tagsString.toLowerCase().includes(query);
                });
            }
            currentPage = 1;
            refreshGalleryUI();
        }

        // Bulanık Başlama ve Yumuşak Yüklenme Efekti Tetikleyicisi
        function triggerLazyBlur(imgElement) {
            if (!imgElement) return;
            
            // Eğer resim zaten tarayıcı belleğinde yüklüyse anında aç
            if (imgElement.complete) {
                imgElement.classList.add('loaded');
                return;
            }

            // Resim yüklendiğinde bulanıklığı kaldır
            imgElement.addEventListener('load', () => {
                imgElement.classList.add('loaded');
            });

            // Resim yüklenirken hata verirse çalışacak yedek plan
            imgElement.addEventListener('error', () => {
                imgElement.src = 'https://via.placeholder.com/300?text=Görsel+Bulunamadı';
                imgElement.classList.add('loaded');
            });
        }

        // Arayüzü Yeniden Çizen Ana Fonksiyon
        function refreshGalleryUI() {
            const grid = document.getElementById("galleryGrid");
            grid.innerHTML = "";

            const adminDisplay = isAdminActive ? "block" : "none";

            // Sayfalama Dilimlemesi
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageItems = filteredItems.slice(startIndex, endIndex);

            if (pageItems.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:#666; padding:40px;">Gösterilecek medya bulunamadı.</p>`;
                updatePaginationControls();
                return;
            }

            pageItems.forEach(item => {
                const card = document.createElement("div");
                card.className = "gallery-card";

                // Etiket mimarisi hazırlığı
                let tagsHtml = "";
                if (item.tags) {
                    const tagsArray = Array.isArray(item.tags) ? item.tags : String(item.tags).split(',');
                    tagsHtml = tagsArray.map(t => `<span class="tag-badge">${t.trim()}</span>`).join('');
                }

                // DÜZELTİLMİŞ VE YENİLENMİŞ INNERHTML YAPISI
                card.innerHTML = `
                    <input type="checkbox" class="card-select-checkbox" style="display: ${adminDisplay}" data-id="${item.id}">
                    <button class="delete-card-btn" style="display: ${adminDisplay}" onclick="deleteSingleItem('${item.id}')">Sil</button>
                    
                    <div class="card-actions-overlay" style="${isAdminActive ? 'display:none;' : 'display:flex;'}">
                        <button class="card-action-btn" title="Linki Kopyala" onclick="copyImageLink(event, '${item.image_url}')">
                            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                        </button>
                    </div>

                    <div class="img-container">
                        <img src="${item.image_url}" alt="KNGLRP" draggable="false">
                    </div>

                    <div class="card-tags-overlay">
                        ${tagsHtml || '<span class="tag-badge" style="opacity:0.5">Etiket Yok</span>'}
                    </div>
                `;

                grid.appendChild(card);

                // Kart eklendikten hemen sonra lazy load efektini bağla
                const targetImg = card.querySelector('.img-container img');
                triggerLazyBlur(targetImg);
            });

            updatePaginationControls();
        }

        // Sayfalama Buton Kontrolleri
        function updatePaginationControls() {
            const totalPages = Math.ceil(filteredItems.length / itemsPerPage) || 1;
            document.getElementById("paginationInfo").innerText = `Sayfa ${currentPage} / ${totalPages}`;
            
            document.getElementById("prevPageBtn").disabled = (currentPage === 1);
            document.getElementById("nextPageBtn").disabled = (currentPage === totalPages);
        }

        function changePage(direction) {
            currentPage += direction;
            refreshGalleryUI();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Link Kopyalama Fonksiyonu
        function copyImageLink(event, url) {
            event.stopPropagation();
            navigator.clipboard.writeText(url).then(() => {
                alert("Görsel linki panoya kopyalandı!");
            }).catch(err => {
                console.error("Kopyalama başarısız:", err);
            });
        }

        // Yönetici Giriş/Çıkış Sistemi
        function toggleAdminMode() {
            const passwordInput = document.getElementById("adminPasswordInput");
            const loginBtn = document.getElementById("loginBtn");
            const bulkDeleteBtn = document.getElementById("bulkDeleteBtn");

            if (!isAdminActive) {
                // Şifreyi projenize göre güncelleyebilirsiniz
                if (passwordInput.value === "kngl123") {
                    isAdminActive = true;
                    loginBtn.innerText = "Çıkış Yap";
                    passwordInput.style.display = "none";
                    bulkDeleteBtn.style.display = "block";
                } else {
                    alert("Hatalı Yönetici Şifresi!");
                }
            } else {
                isAdminActive = false;
                loginBtn.innerText = "Giriş Yap";
                passwordInput.value = "";
                passwordInput.style.style.display = "block";
                bulkDeleteBtn.style.display = "none";
            }
            refreshGalleryUI();
        }

        // Tekli Silme İşlemi
        async function deleteSingleItem(id) {
            if (!confirm("Bu görseli silmek istediğinize emin misiniz?")) return;
            try {
                const { error } = await _supabase.from('gallery').delete().eq('id', id);
                if (error) throw error;
                
                galleryItems = galleryItems.filter(item => item.id !== id);
                handleSearch(); // Listeyi güncelle ve tekrar çiz
            } catch (err) {
                alert("Silme hatası: " + err.message);
            }
        }

        // Toplu Silme İşlemi
        async function handleBulkDelete() {
            const checkboxes = document.querySelectorAll(".card-select-checkbox:checked");
            if (checkboxes.length === 0) {
                alert("Lütfen silmek için önce görsel seçin!");
                return;
            }

            if (!confirm(`${checkboxes.length} adet görseli kalıcı olarak silmek istiyor musunuz?`)) return;

            const idsToDelete = Array.from(checkboxes).map(cb => cb.getAttribute("data-id"));

            try {
                const { error } = await _supabase.from('gallery').delete().in('id', idsToDelete);
                if (error) throw error;

                galleryItems = galleryItems.filter(item => !idsToDelete.includes(item.id));
                handleSearch();
                alert("Seçilen görseller başarıyla silindi.");
            } catch (err) {
                alert("Toplu silme işleminde hata oluştu: " + err.message);
            }
        }
    </script>
</body>
</html>
