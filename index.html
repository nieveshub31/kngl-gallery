<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNGLRP | Resmi Galeri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d0d12; color: #e4e4e7; }
        .neon-border { border-color: #dc2626; box-shadow: 0 0 10px rgba(220, 38, 38, 0.3); }
        .neon-text { text-shadow: 0 0 8px rgba(220, 38, 38, 0.5); }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col">

    <header class="border-b border-zinc-800 bg-zinc-950/80 backdrop-blur sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="text-2xl font-black tracking-wider text-red-650 neon-text text-red-600">KNGL<span class="text-white">RP</span> GALERİ</span>
        </div>
        <div>
            <button id="adminBtn" onclick="toggleAdminModal()" class="bg-zinc-900 border border-zinc-700 hover:border-red-600 px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2">
                <i class="fa-solid fa-lock"></i> <span id="adminBtnText">Yönetici Girişi</span>
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-6 space-y-8">

        <section id="uploadSection" class="hidden bg-zinc-950 border border-zinc-800 rounded-xl p-6 space-y-6 transition-all">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-3">
                <h2 class="text-xl font-bold text-white flex items-center gap-2"><i class="fa-solid fa-cloud-arrow-up text-red-500"></i> Yeni Görsel Ekle</h2>
                <button onclick="logoutAdmin()" class="text-zinc-400 hover:text-red-500 text-sm">Oturumu Kapat</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div id="dropZone" class="border-2 border-dashed border-zinc-700 hover:border-red-500 rounded-xl p-8 flex flex-col items-center justify-center text-center cursor-pointer transition bg-zinc-900/50">
                    <i class="fa-solid fa-images text-4xl text-zinc-500 mb-3 id-icon"></i>
                    <p class="text-sm font-medium text-zinc-300">Görseli buraya sürükleyip bırakın veya <span class="text-red-500">dosya seçin</span></p>
                    <p class="text-xs text-zinc-500 mt-1">PNG, JPG, JPEG, WEBP</p>
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                </div>

                <div class="flex flex-col justify-between space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Görsel URL (İsteğe Bağlı)</label>
                        <input type="url" id="urlInput" placeholder="https://i.hizliresim.com/...jpg" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-red-500 text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Görsel Açıklaması</label>
                        <textarea id="descInput" rows="3" placeholder="Görsel hakkında detaylar, rol içi bilgiler..." class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-red-500 text-white resize-none"></textarea>
                    </div>
                    <button onclick="handleUpload()" class="w-full bg-red-600 hover:bg-red-700 text-white font-medium py-2.5 rounded-lg transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-plus"></i> Galeriye Ekle
                    </button>
                </div>
            </div>
        </section>

        <section class="space-y-4">
            <div class="flex justify-between items-center bg-zinc-950 p-4 border border-zinc-800 rounded-xl">
                <h2 class="text-lg font-bold tracking-wide">TÜM GÖRSELLER (<span id="imageCount">0</span>)</h2>
                
                <div id="adminControls" class="hidden flex items-center gap-3">
                    <button id="bulkDeleteBtn" onclick="deleteSelectedImages()" class="bg-red-600/10 hover:bg-red-600 border border-red-500/30 text-red-500 hover:text-white px-4 py-1.5 rounded-lg text-sm font-medium transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        <i class="fa-solid fa-trash-can"></i> Seçilenleri Sil (<span id="selectCount">0</span>)
                    </button>
                </div>
            </div>

            <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                </div>
        </section>
    </main>

    <div id="loginModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-zinc-950 border border-zinc-800 rounded-xl p-6 w-full max-w-sm space-y-4">
            <div class="text-center">
                <i class="fa-solid fa-shield-halved text-3xl text-red-500 mb-2"></i>
                <h3 class="text-lg font-bold text-white">Yönetici Yetkilendirmesi</h3>
                <p class="text-xs text-zinc-400 mt-1">Görsel yüklemek ve silmek için şifre girin.</p>
            </div>
            <div>
                <input type="password" id="passwordInput" placeholder="••••••••" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-2.5 text-center text-sm focus:outline-none focus:border-red-500 text-white tracking-widest">
                <p id="loginError" class="text-red-500 text-xs mt-1 hidden text-center">Hatalı Şifre!</p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleAdminModal()" class="w-1/2 bg-zinc-900 border border-zinc-700 hover:bg-zinc-800 text-sm font-medium py-2 rounded-lg transition">İptal</button>
                <button onclick="verifyPassword()" class="w-1/2 bg-red-600 hover:bg-red-700 text-sm font-medium py-2 rounded-lg text-white transition">Giriş Yap</button>
            </div>
        </div>
    </div>

    <div id="lightboxModal" class="fixed inset-0 bg-black/95 z-50 hidden flex flex-col items-center justify-center p-4" onclick="closeLightbox()">
        <button class="absolute top-6 right-6 text-white text-2xl hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
        <img id="lightboxImg" src="" class="max-w-full max-h-[80vh] rounded-lg object-contain">
        <p id="lightboxDesc" class="mt-4 text-center max-w-2xl text-zinc-300 px-4"></p>
    </div>

    <script>
        const AUTH_PASS = "nieves1312";
        let isAdmin = false;
        let images = JSON.parse(localStorage.getItem('kngl_gallery')) || [];
        let selectedImages = [];

        // Başlangıç
        window.onload = () => {
            renderGallery();
            setupDragAndDrop();
        };

        // Admin Giriş Fonksiyonları
        function toggleAdminModal() {
            const modal = document.getElementById('loginModal');
            modal.classList.toggle('hidden');
            document.getElementById('passwordInput').value = '';
            document.getElementById('loginError').classList.add('hidden');
        }

        function verifyPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === AUTH_PASS) {
                isAdmin = true;
                toggleAdminModal();
                updateAdminUI();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function logoutAdmin() {
            isAdmin = false;
            updateAdminUI();
        }

        function updateAdminUI() {
            const uploadSection = document.getElementById('uploadSection');
            const adminControls = document.getElementById('adminControls');
            const adminBtnText = document.getElementById('adminBtnText');
            
            if (isAdmin) {
                uploadSection.classList.remove('hidden');
                adminControls.classList.remove('hidden');
                adminBtnText.innerText = "Yönetici Aktif";
                document.getElementById('adminBtn').classList.add('neon-border');
            } else {
                uploadSection.classList.add('hidden');
                adminControls.classList.add('hidden');
                adminBtnText.innerText = "Yönetici Girişi";
                document.getElementById('adminBtn').classList.remove('neon-border');
                selectedImages = [];
            }
            renderGallery();
        }

        // Sürükle Bırak Ayarları
        function setupDragAndDrop() {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');

            dropZone.addEventListener('click', () => fileInput.click());

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('border-red-500', 'bg-zinc-900');
            });

            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('border-red-500', 'bg-zinc-900');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-red-500', 'bg-zinc-900');
                if (e.dataTransfer.files.length > 0) {
                    fileInput.files = e.dataTransfer.files;
                    handleFileSelect(e.dataTransfer.files[0]);
                }
            });

            fileInput.addEventListener('change', () => {
                if (fileInput.files.length > 0) {
                    handleFileSelect(fileInput.files[0]);
                }
            });
        }

        let tempBase64 = "";
        function handleFileSelect(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                tempBase64 = e.target.result;
                document.getElementById('dropZone').innerHTML = `<i class="fa-solid fa-circle-check text-4xl text-green-500 mb-2"></i><p class="text-xs text-zinc-300 font-mono max-w-[200px] truncate">${file.name}</p>`;
            };
            reader.readAsDataURL(file);
        }

        // Yükleme Tetikleyici
        function handleUpload() {
            const urlInput = document.getElementById('urlInput').value;
            const descInput = document.getElementById('descInput').value;
            let finalSrc = "";

            if (urlInput) {
                finalSrc = urlInput;
            } else if (tempBase64) {
                finalSrc = tempBase64;
            } else {
                alert("Lütfen bir dosya ekleyin veya resim URL'si girin.");
                return;
            }

            const newImg = {
                id: Date.now().toString(),
                src: finalSrc,
                description: descInput || "Açıklama belirtilmedi.",
                date: new Date().toLocaleDateString('tr-TR')
            };

            images.unshift(newImg);
            localStorage.setItem('kngl_gallery', JSON.stringify(images));
            
            // Formu sıfırla
            document.getElementById('urlInput').value = "";
            document.getElementById('descInput').value = "";
            document.getElementById('fileInput').value = "";
            tempBase64 = "";
            document.getElementById('dropZone').innerHTML = `<i class="fa-solid fa-images text-4xl text-zinc-500 mb-3"></i><p class="text-sm font-medium text-zinc-300">Görseli buraya sürükleyip bırakın veya <span class="text-red-500">dosya seçin</span></p><p class="text-xs text-zinc-500 mt-1">PNG, JPG, JPEG, WEBP</p>`;

            renderGallery();
        }

        // Galeri Arayüzünü Çizme
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            const countSpan = document.getElementById('imageCount');
            grid.innerHTML = "";
            countSpan.innerText = images.length;

            if (images.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-zinc-500"><i class="fa-solid fa-image-portrait text-5xl mb-3 block"></i> Galeride henüz görsel yok.</div>`;
                return;
            }

            images.forEach(img => {
                const isSelected = selectedImages.includes(img.id);
                const card = document.createElement('div');
                card.className = "bg-zinc-950 border border-zinc-800 rounded-xl overflow-hidden group relative transition hover:border-zinc-700 flex flex-col justify-between";
                
                card.innerHTML = `
                    <div class="relative overflow-hidden aspect-video bg-zinc-900 cursor-pointer" onclick="openLightbox('${img.src}', \`${img.description}\`)">
                        <img src="${img.src}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" loading="lazy">
                    </div>
                    <div class="p-4 space-y-2 flex-1 flex flex-col justify-between">
                        <p class="text-sm text-zinc-300 line-clamp-3">${img.description}</p>
                        <div class="flex justify-between items-center pt-2 border-t border-zinc-900 text-xs text-zinc-500">
                            <span>${img.date}</span>
                            ${isAdmin ? `
                                <div class="flex items-center gap-2" onclick="event.stopPropagation();">
                                    <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect('${img.id}')" class="w-4 h-4 rounded accent-red-600 cursor-pointer">
                                    <button onclick="deleteSingleImage('${img.id}')" class="text-zinc-500 hover:text-red-500 transition text-sm"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            updateBulkDeleteButton();
        }

        // Seçim mantığı (Toplu silme için)
        function toggleSelect(id) {
            if (selectedImages.includes(id)) {
                selectedImages = selectedImages.filter(item => item !== id);
            } else {
                selectedImages.push(id);
            }
            updateBulkDeleteButton();
        }

        function updateBulkDeleteButton() {
            const btn = document.getElementById('bulkDeleteBtn');
            const count = document.getElementById('selectCount');
            if(btn && count) {
                count.innerText = selectedImages.length;
                btn.disabled = selectedImages.length === 0;
            }
        }

        // Tekli Silme
        function deleteSingleImage(id) {
            if(confirm("Bu görseli galeriden silmek istediğinize emin misiniz?")) {
                images = images.filter(img => img.id !== id);
                selectedImages = selectedImages.filter(item => item !== id);
                localStorage.setItem('kngl_gallery', JSON.stringify(images));
                renderGallery();
            }
        }

        // Toplu Silme
        function deleteSelectedImages() {
            if(confirm(`${selectedImages.length} adet görseli toplu silmek istediğinize emin misiniz?`)) {
                images = images.filter(img => !selectedImages.includes(img.id));
                selectedImages = [];
                localStorage.setItem('kngl_gallery', JSON.stringify(images));
                renderGallery();
            }
        }

        // Büyük Fotoğraf Gösterimi (Lightbox)
        function openLightbox(src, desc) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightboxDesc').innerText = desc;
            document.getElementById('lightboxModal').classList.remove('hidden');
        }

        function closeLightbox() {
            document.getElementById('lightboxModal').classList.add('hidden');
        }
    </script>
</body>
</html>
