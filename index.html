<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNGLRP | Premium Media Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-darker: #050508;
            --bg-main: #0a0b10;
            --bg-card: #11131a;
            --bg-input: #171a24;
            --accent-green: #00ff87; 
            --accent-glow: rgba(0, 255, 135, 0.2);
            --text-white: #ffffff;
            --text-gray: #8f9cae;
            --border-color: #1f2433;
            --danger-red: #ff4a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-white);
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 80% 20%, rgba(0, 255, 135, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 24px;
            position: relative;
            z-index: 1;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 24px;
            gap: 20px;
        }

        .logo-area h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .logo-area h1 span {
            color: var(--accent-green);
            text-shadow: 0 0 15px var(--accent-glow);
            font-family: 'JetBrains Mono', monospace;
        }

        .controls-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        input {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-white);
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        #searchInput {
            width: 300px;
        }

        button {
            background-color: var(--accent-green);
            color: var(--bg-darker);
            font-size: 14px;
            font-weight: 700;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--accent-glow);
        }

        button.btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-white);
        }

        button.btn-secondary:hover {
            background-color: var(--bg-input);
            border-color: var(--text-gray);
            box-shadow: none;
        }

        button.btn-danger {
            background-color: transparent;
            border: 1px solid var(--danger-red);
            color: var(--danger-red);
        }

        button.btn-danger:hover {
            background-color: var(--danger-red);
            color: var(--text-white);
            box-shadow: 0 5px 15px rgba(255, 74, 74, 0.2);
        }

        /* --- YÜKLEME PANELİ (YÖNETİCİ MODU) --- */
        #uploadSection {
            background-color: var(--bg-card);
            border: 1px solid var(--accent-green);
            box-shadow: 0 0 20px rgba(0, 255, 135, 0.05);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 40px;
            display: none;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        #uploadSection h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .drop-zone {
            border: 2px dashed var(--border-color);
            background-color: var(--bg-darker);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-gray);
            font-size: 14px;
            text-align: center;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-green);
            background-color: var(--bg-input);
            color: var(--text-white);
        }

        .form-right {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
        }

        .divider-text {
            text-align: center;
            color: var(--text-gray);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* --- ŞİFRE MODAL POPUP --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5, 5, 8, 0.9);
            backdrop-filter: blur(8px);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .modal-content h2 {
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .modal-content p {
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .modal-close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: transparent;
            border: none;
            color: var(--text-gray);
            font-size: 24px;
            cursor: pointer;
        }
        .modal-close-btn:hover { color: white; }

        /* --- GALERİ GRID --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .media-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .media-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent-green);
        }

        .img-container {
            width: 100%;
            height: 240px;
            overflow: hidden;
            background-color: var(--bg-darker);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .media-card:hover .img-container img {
            transform: scale(1.05);
        }

        .card-footer {
            padding: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid var(--border-color);
        }

        .tag {
            background-color: var(--bg-input);
            color: var(--text-gray);
            font-size: 12px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-family: 'JetBrains Mono', monospace;
        }

        /* --- SİLME BUTONU --- */
        .delete-card-btn {
            position: absolute;
            top: 12px; right: 12px;
            background-color: rgba(255, 74, 74, 0.9);
            color: white;
            border: none;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 10;
        }
        .delete-card-btn:hover {
            background-color: var(--danger-red);
            transform: scale(1.1);
        }

        @media (max-width: 900px) {
            .upload-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 650px) {
            header { flex-direction: column; align-items: stretch; }
            .controls-area { flex-direction: column; align-items: stretch; }
            #searchInput { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-area">
                <h1>KNGLRP <span>Gallery</span></h1>
            </div>
            <div class="controls-area">
                <input type="text" id="searchInput" placeholder="Tag araması yap...">
                <button id="mainActionBtn">Resim Yükle</button>
            </div>
        </header>

        <section id="uploadSection">
            <div class="panel-header">
                <h2>Yönetici Kontrol Paneli <span style="color:var(--accent-green); font-size:12px; font-family:'JetBrains Mono'">(Aktif)</span></h2>
                <div style="display: flex; gap: 12px;">
                    <button id="deleteAllBtn" class="btn-danger">Tüm Resimleri Sil</button>
                    <button id="closeAdminBtn" class="btn-secondary">Yönetici Modunu Kapat</button>
                </div>
            </div>
            <div class="upload-grid">
                <div id="dropZone" class="drop-zone">
                    <span id="dropZoneText">Görsel sürükleyin veya tıklayıp dosyadan seçin</span>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                </div>
                <div class="form-right">
                    <div class="divider-text">Veya Doğrudan Link</div>
                    <input type="text" id="linkInput" placeholder="Görsel adresi (URL) yapıştırın...">
                    <input type="text" id="tagInput" placeholder="Etiketler (virgülle ayırın: lspd, illegal, car)">
                    <button id="uploadBtn">Galeriye Gönder</button>
                </div>
            </div>
            <p id="uploadStatus" style="margin-top: 16px; font-size: 14px; font-weight: 600;"></p>
        </section>

        <main id="galleryGrid" class="gallery-grid">
            </main>
    </div>

    <div id="passwordModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-btn" id="closeModalBtn">&times;</button>
            <h2>Yönetici Doğrulaması</h2>
            <p>Görsel yükleme ve silme paneline erişmek için şifreyi girin.</p>
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <input type="password" id="passwordInput" placeholder="Erişim şifresini yazın...">
                <button id="loginBtn" style="width: 100%; justify-content: center;">Onayla</button>
            </div>
            <p id="loginError" style="color: var(--danger-red); display: none; margin-top: 14px; font-size: 14px; font-weight: 600; text-align: center;">Hatalı Şifre!</p>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. SUPABASE AYARLARI (İsim çakışması engellendi)
        // ==========================================
        const MY_SUPABASE_TARGET_URL = 'https://rqtlwqphwfjlysnwkpel.supabase.co';
        const MY_SUPABASE_TARGET_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxdGx3cXBod2ZqbHlzbndrcGVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDEyNzIsImV4cCI6MjA5ODkxNzI3Mn0.0Xx7BJe0O5VB5uZIZL8LCqOMTTWvSBnGKtGTY6kQGpY';
        
        let knglSupaClient = null; 
        let isAdminActive = false; 

        try {
            if (window.supabase && MY_SUPABASE_TARGET_URL && MY_SUPABASE_TARGET_URL.startsWith('http')) {
                knglSupaClient = window.supabase.createClient(MY_SUPABASE_TARGET_URL, MY_SUPABASE_TARGET_KEY);
            }
        } catch(e) {
            console.error("Supabase yükleme pas geçildi:", e);
        }

        // DOM Elementleri
        const galleryGrid = document.getElementById('galleryGrid');
        const searchInput = document.getElementById('searchInput');
        const uploadSection = document.getElementById('uploadSection');
        const mainActionBtn = document.getElementById('mainActionBtn');
        const closeAdminBtn = document.getElementById('closeAdminBtn');
        const deleteAllBtn = document.getElementById('deleteAllBtn');
        const passwordModal = document.getElementById('passwordModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const dropZone = document.getElementById('dropZone');
        const dropZoneText = document.getElementById('dropZoneText');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        let selectedFile = null;

        // ==========================================
        // 2. MODAL & PANEL AÇILIŞ MANTIĞI
        // ==========================================
        if (mainActionBtn) {
            mainActionBtn.addEventListener('click', function() {
                if (isAdminActive) {
                    if (uploadSection) uploadSection.scrollIntoView({ behavior: 'smooth' });
                } else {
                    if (loginError) loginError.style.display = 'none';
                    if (passwordInput) { passwordInput.value = ''; passwordInput.focus(); }
                    if (passwordModal) passwordModal.style.display = 'flex';
                }
            });
        }

        if (closeModalBtn) closeModalBtn.addEventListener('click', () => passwordModal.style.display = 'none');
        window.addEventListener('click', (e) => { if (e.target === passwordModal) passwordModal.style.display = 'none'; });

        // Şifre Giriş Kontrolü
        if (loginBtn) {
            loginBtn.addEventListener('click', function() {
                if (passwordInput && passwordInput.value === 'nieves1312') {
                    isAdminActive = true;
                    if (passwordModal) passwordModal.style.display = 'none';
                    if (uploadSection) uploadSection.style.display = 'block';
                    if (mainActionBtn) mainActionBtn.style.display = 'none';
                    if (uploadSection) uploadSection.scrollIntoView({ behavior: 'smooth' });
                    
                    document.querySelectorAll('.delete-card-btn').forEach(btn => btn.style.display = 'flex');
                } else {
                    if (loginError) loginError.style.display = 'block';
                }
            });
        }

        // Yönetici Modunu Kapatma
        if (closeAdminBtn) {
            closeAdminBtn.addEventListener('click', function() {
                isAdminActive = false;
                if (uploadSection) uploadSection.style.display = 'none';
                if (mainActionBtn) mainActionBtn.style.display = 'inline-flex';
                
                document.querySelectorAll('.delete-card-btn').forEach(btn => btn.style.display = 'none');
            });
        }

        // ==========================================
        // 3. RESİMLERİ VERİTABANINDAN ÇEKME
        // ==========================================
        async function fetchImages(searchQuery = '') {
            if (!galleryGrid) return;
            galleryGrid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-gray);">Medyalar senkronize ediliyor...</p>';
            
            if (!knglSupaClient) {
                galleryGrid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-gray);">Supabase veritabanı ayarları henüz girilmemiş.</p>';
                return;
            }

            try {
                let query = knglSupaClient.from('gallery_images').select('*').order('created_at', { ascending: false });
                
                if (searchQuery) {
                    query = query.ilike('tags', `%${searchQuery}%`);
                }

                const { data, error } = await query;
                if (error) {
                    galleryGrid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--danger-red);">Hata: ${error.message}</p>`;
                    return;
                }

                galleryGrid.innerHTML = '';
                if (!data || data.length === 0) {
                    galleryGrid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-gray);">Gösterilebilecek görsel bulunamadı.</p>';
                    return;
                }

                data.forEach(item => {
                    const tagsHtml = (item.tags || '').split(',')
                        .map(t => t.trim() ? `<span class="tag">#${t.trim()}</span>` : '')
                        .join('');

                    const card = document.createElement('div');
                    card.className = 'media-card';
                    
                    const deleteBtnDisplay = isAdminActive ? 'flex' : 'none';

                    card.innerHTML = `
                        <button class="delete-card-btn" style="display: ${deleteBtnDisplay}" onclick="deleteSingleImage(${item.id})">&times;</button>
                        <div class="img-container">
                            <img src="${item.image_url}" alt="KNGLRP Media" loading="lazy">
                        </div>
                        <div class="card-footer">${tagsHtml}</div>
                    `;
                    galleryGrid.appendChild(card);
                });
            } catch (err) {
                galleryGrid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--danger-red);">Sistem Hatası: ${err.message}</p>`;
            }
        }

        if (searchInput) {
            searchInput.addEventListener('input', (e) => fetchImages(e.target.value));
        }

        // ==========================================
        // 4. RESİM SİLME İŞLEMLERİ
        // ==========================================
        window.deleteSingleImage = async function(id) {
            if (!confirm('Bu görseli galeriden kalıcı olarak silmek istediğinize emin misiniz?')) return;
            try {
                const { error } = await knglSupaClient.from('gallery_images').delete().eq('id', id);
                if (error) alert('Silme hatası: ' + error.message);
                else fetchImages();
            } catch (err) {
                alert('Silme esnasında hata oluştu: ' + err.message);
            }
        };

        if (deleteAllBtn) {
            deleteAllBtn.addEventListener('click', async function() {
                if (!confirm('DİKKAT: Galerideki TÜM resimler kalıcı olarak silinecek!')) return;
                if (!confirm('Son onay: Tabloyu tamamen sıfırlamak istediğinize emin misiniz?')) return;

                try {
                    const { error } = await knglSupaClient.from('gallery_images').delete().gt('id', 0);
                    if (error) alert('Toplu silme hatası: ' + error.message);
                    else { alert('Galeri tamamen temizlendi.'); fetchImages(); }
                } catch (err) {
                    alert('Beklenmedik Hata: ' + err.message);
                }
            });
        }

        // ==========================================
        // 5. MEDYA YÜKLEME VE KART OLUŞTURMA
        // ==========================================
        if (dropZone) {
            dropZone.addEventListener('click', () => fileInput && fileInput.click());
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                if (e.dataTransfer && e.dataTransfer.files.length) {
                    selectedFile = e.dataTransfer.files[0];
                    if (dropZoneText) {
                        dropZoneText.innerText = `Seçilen: ${selectedFile.name}`;
                        dropZoneText.style.color = 'var(--accent-green)';
                    }
                }
            });
        }

        if (fileInput) {
            fileInput.addEventListener('change', (e) => {
                if (e.target.files && e.target.files.length) {
                    selectedFile = e.target.files[0];
                    if (dropZoneText) {
                        dropZoneText.innerText = `Seçilen: ${selectedFile.name}`;
                        dropZoneText.style.color = 'var(--accent-green)';
                    }
                }
            });
        }

        if (uploadBtn) {
            uploadBtn.addEventListener('click', async () => {
                const linkInput = document.getElementById('linkInput').value;
                const tags = document.getElementById('tagInput').value;
                const statusText = document.getElementById('uploadStatus');
                
                if (!knglSupaClient) return alert('Veritabanı bağlantısı yok.');
                if (!tags) return alert('Lütfen etiketleri (tag) girin.');
                if (!selectedFile && !linkInput) return alert('Dosya yükleyin veya bir URL adresi girin.');

                statusText.style.color = 'var(--text-white)';
                statusText.innerText = "Bulut sunucusuna işleniyor...";
                
                let finalImageUrl = linkInput;

                try {
                    if (selectedFile) {
                        const fileExt = selectedFile.name.split('.').pop();
                        const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                        
                        const { error: uploadError } = await knglSupaClient.storage
                            .from('gallery')
                            .upload(fileName, selectedFile);
                            
                        if (uploadError) {
                            statusText.style.color = 'var(--danger-red)';
                            statusText.innerText = 'Storage Hatası: ' + uploadError.message;
                            return;
                        }

                        const { data } = knglSupaClient.storage.from('gallery').getPublicUrl(fileName);
                        finalImageUrl = data.publicUrl;
                    }

                    const { error: dbError } = await knglSupaClient.from('gallery_images').insert([
                        { image_url: finalImageUrl, tags: tags }
                    ]);

                    if (dbError) {
                        statusText.style.color = 'var(--danger-red)';
                        statusText.innerText = 'Database Kayıt Hatası: ' + dbError.message;
                    } else {
                        statusText.style.color = 'var(--accent-green)';
                        statusText.innerText = 'Medya başarıyla sisteme yüklendi!';
                        
                        document.getElementById('linkInput').value = '';
                        document.getElementById('tagInput').value = '';
                        selectedFile = null;
                        if (dropZoneText) {
                            dropZoneText.innerText = 'Görsel sürükleyin veya tıklayıp dosyadan seçin';
                            dropZoneText.style.color = 'var(--text-gray)';
                        }
                        if (fileInput) fileInput.value = '';
                        
                        setTimeout(() => { if (statusText) statusText.innerText = ''; }, 4000);
                        fetchImages(); 
                    }
                } catch (err) {
                    statusText.style.color = 'var(--danger-red)';
                    statusText.innerText = 'Hata: ' + err.message;
                }
            });
        }

        // Başlangıç tetiklemesi
        fetchImages();
    </script>
</body>
</html>
