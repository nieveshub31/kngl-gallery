        // 🗑️ Toplu Silme Butonunun Durumunu Güncelleme
        function updateBulkDeleteButton() {
            const bulkBtn = document.getElementById('bulk-delete-btn');
            const countEl = document.getElementById('select-count');
            countEl.innerText = selectedImageIds.length;
            
            if (selectedImageIds.length > 0) {
                bulkBtn.classList.remove('hidden');
            } else {
                bulkBtn.classList.add('hidden');

        }

        // 🗑️ Toplu Silme Butonunun Durumunu Güncelleme (Hata Korumalı)
        function updateBulkDeleteButton() {
            const bulkBtn = document.getElementById('bulk-delete-btn');
            const countEl = document.getElementById('select-count');
            
            if (bulkBtn) {
                if (selectedImageIds.length > 0) {
                    bulkBtn.classList.remove('hidden');
                } else {
                    bulkBtn.classList.add('hidden');
                }
                
                // Eğer butonun içindeki sayaç elementi bulunduysa sayıyı yaz, yoksa direkt butona yaz
                if (countEl) {
                    countEl.innerText = selectedImageIds.length;
                } else {
                    bulkBtn.innerText = `Seçilenleri Sil (${selectedImageIds.length})`;
                }
            }
        }

        // 🛑 Toplu Silme İşlemini Çalıştıran Fonksiyon (Güvenli ve Paralel Versiyon)
        async function executeBulkDelete() {
            if (selectedImageIds.length === 0) return;
            if (!confirm(`Seçtiğiniz ${selectedImageIds.length} adet fotoğrafı kalıcı olarak silmek istiyor musunuz?`)) return;

            const bulkBtn = document.getElementById('bulk-delete-btn');
            if (bulkBtn) {
                bulkBtn.disabled = true;
                bulkBtn.innerText = "Siliniyor...";
            }

            try {
                const deletePromises = selectedImageIds.map(id => 
                    fetch(`${SUPABASE_URL}/rest/v1/gallery?id=eq.${id}`, {
                        method: 'DELETE',
                        headers: {
                            "apikey": SUPABASE_KEY,
                            "Authorization": `Bearer ${SUPABASE_KEY}`
                        }
                    })
                );

                const responses = await Promise.all(deletePromises);
                const allOk = responses.every(res => res.ok);

                if (allOk) {
                    allImages = allImages.filter(img => !selectedImageIds.includes(img.id.toString()));
                    selectedImageIds = [];
                    updateBulkDeleteButton();

                    const totalPages = Math.ceil(allImages.length / itemsPerPage);
                    if (currentPage > totalPages && currentPage > 1) {
                        currentPage = totalPages;
                    }
                    renderPage();
                    alert("Seçilen görseller başarıyla temizlendi.");
                } else {
                    alert("Bazı görseller silinirken hata oluştu. Lütfen sayfayı yenileyip tekrar deneyin.");
                }
            } catch (error) {
                console.error("Toplu silme hatası:", error);
                alert("Bağlantı hatası: " + error.message);
            } finally {
                // Hata veren kısım burasıydı, artık elementin varlığı kontrol ediliyor
                const finalBulkBtn = document.getElementById('bulk-delete-btn');
                if (finalBulkBtn) {
                    finalBulkBtn.disabled = false;
                    finalBulkBtn.innerHTML = `Seçilenleri Sil (<span id="select-count">${selectedImageIds.length}</span>)`;
                }
            }
        }

        function updatePaginationControls() {
            const paginationEl = document.getElementById('pagination-container');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const pageNumbersEl = document.getElementById('page-numbers');

            const totalPages = Math.ceil(allImages.length / itemsPerPage);

            if (totalPages <= 1) {
                paginationEl.classList.add('hidden');
                return;
            }

            paginationEl.classList.remove('hidden');
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;

            pageNumbersEl.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                if (i === currentPage) {
                    btn.className = "px-3.5 py-1.5 bg-purple-600 border border-purple-500 text-white rounded-lg text-sm font-bold shadow-lg transition-all";
                } else {
                    btn.className = "px-3.5 py-1.5 bg-gray-950 border border-purple-950/60 text-gray-400 hover:text-purple-400 hover:border-purple-500/30 rounded-lg text-sm font-medium transition-all";
                }
                btn.onclick = () => {
                    currentPage = i;
                    renderPage();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                pageNumbersEl.appendChild(btn);
            }
        }

        function changePage(direction) {
            currentPage += direction;
            renderPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteImage(id) {
            if (!confirm("Bu fotoğrafı kalıcı olarak silmek istiyor musunuz?")) return;
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/gallery?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`
                    }
                });
                if(res.ok) {
                    allImages = allImages.filter(img => img.id != id);
                    selectedImageIds = selectedImageIds.filter(item => item !== id.toString());
                    updateBulkDeleteButton();
                    
                    const totalPages = Math.ceil(allImages.length / itemsPerPage);
                    if (currentPage > totalPages && currentPage > 1) {
                        currentPage = totalPages;
                    }
                    renderPage();
                }
            } catch (error) {
                alert("Silme sırasında hata oluştu.");
            }
        }

                btnUrl.className = "flex-1 py-2 text-xs font-semibold rounded-lg text-gray-400";

                btnFile.className = "flex-1 py-2 text-xs font-semibold rounded-lg text-gray-400";

        async function submitBatchImages() {
            const fileInput = document.getElementById('img-file');
            const urlInput = document.getElementById('img-url');
            const captionInput = document.getElementById('img-caption');
            const caption = captionInput.value.trim();
            
            const globalContainer = document.getElementById('global-upload-container');
            const globalProgressText = document.getElementById('global-progress-text');
            const globalProgressBar = document.getElementById('global-progress-bar');
            
            let urlsToUpload = [];
            let totalCount = 0;

            if (activeMethod === 'file') {
                const files = fileInput.files;
                if (files.length === 0) { alert("Lütfen en az bir dosya seçin!"); return; }
                totalCount = files.length;
                
                closeAdminModal();
                isUploading = true;

                globalContainer.classList.remove('hidden');
                globalProgressText.innerText = `Görseller ImgBB'ye aktarılıyor: 0 / ${totalCount}`;
                globalProgressBar.style.width = `0%`;

                for (let i = 0; i < files.length; i++) {
                    const percent = Math.round((i / totalCount) * 80); 
                    globalProgressBar.style.width = `${percent}%`;
                    globalProgressText.innerText = `Görseller ImgBB'ye aktarılıyor: ${i + 1} / ${totalCount}`;

                    const formData = new FormData();
                    formData.append("image", files[i]);

                    try {
                        const uploadRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                            method: "POST",
                            body: formData
                        });
                        if (uploadRes.ok) {
                            const uploadData = await uploadRes.json();
                            if (uploadData.success) urlsToUpload.push(uploadData.data.url);
                        }
                    } catch (e) {
                        console.error(e);
                    }
                }
            } else {
                const rawLinks = urlInput.value.split('\n');
                urlsToUpload = rawLinks.map(link => link.trim()).filter(link => link.startsWith('http'));
                if (urlsToUpload.length === 0) { alert("Lütfen geçerli URL adresleri girin!"); return; }
                totalCount = urlsToUpload.length;

                closeAdminModal();
                isUploading = true;

                globalContainer.classList.remove('hidden');
                globalProgressBar.style.width = `40%`;
                globalProgressText.innerText = `Linkler hazırlanıyor...`;
            }

            if(urlsToUpload.length === 0) {
                alert("Yüklenecek görsel bulunamadı.");
                hideGlobalProgress();
                return;
            }

            globalProgressBar.style.width = `85%`;
            globalProgressText.innerText = `Veriler Los Santos veri merkezine yazılıyor...`;

            try {
                const payload = urlsToUpload.map(url => ({ url: url, caption: caption }));
                const dbRes = await fetch(`${SUPABASE_URL}/rest/v1/gallery`, {
                    method: 'POST',
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=representation"
                    },
                    body: JSON.stringify(payload)
                });

                if(dbRes.ok) {
                    globalProgressBar.style.width = `100%`;
                    globalProgressText.innerText = `Yükleme Tamamlandı! Galeri güncelleniyor...`;

                    const newImgs = await dbRes.json();
                    allImages = [...newImgs, ...allImages];
                    currentPage = 1;
                    
                    fileInput.value = ''; urlInput.value = ''; captionInput.value = '';
                    
                    setTimeout(() => {
                        renderPage();
                        hideGlobalProgress();
                    }, 1200);
                } else {
                    alert("Veritabanı kaydı başarısız oldu.");
                    hideGlobalProgress();
                }
            } catch (error) {
                alert("Sistem hatası.");
                hideGlobalProgress();
            }

            function hideGlobalProgress() {
                isUploading = false;
                globalContainer.classList.add('animate__fadeOutUp');
                setTimeout(() => {
                    globalContainer.classList.add('hidden');
                    globalContainer.classList.remove('animate__fadeOutUp');
                    globalProgressBar.style.width = `0%`;
                }, 500);
            }
        }

// Güncelleme işlemi
async function saveCaption() {
    const newCaption = document.getElementById('modal-caption-input').value;
    const btn = document.getElementById('save-caption-btn');
    
    btn.innerText = "Kaydediliyor...";
    
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/gallery?id=eq.${currentEditingId}`, {
            method: 'PATCH', // Güncelleme için PATCH kullanıyoruz
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ caption: newCaption })
        });
        
        if (res.ok) {
            alert("Açıklama başarıyla güncellendi!");
            // Yerel veriyi güncelle
            const img = allImages.find(i => i.id == currentEditingId);
            if(img) img.caption = newCaption;
            renderPage(); // Galeriyi yenile
            closeModal();
        } else {
            alert("Güncelleme başarısız.");
        }
    } catch (e) {
        alert("Bağlantı hatası.");
    } finally {
        btn.innerText = "Kaydet";
    }
}


// Arama ve Sıralama Fonksiyonu
function filterGallery() {
    const searchTerm = document.getElementById('search-input').value.toLowerCase();
    const sortValue = document.getElementById('sort-select').value;

    let filtered = [...allImages];

    // 1. Arama Filtresi
    filtered = filtered.filter(img => 
        (img.caption || "").toLowerCase().includes(searchTerm)
    );

    // 2. Sıralama
    if (sortValue === 'newest') {
        filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    } else {
        filtered.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    }

    // Filtrelenmiş veriyi sayfaya yansıt
    renderFilteredPage(filtered);
}
