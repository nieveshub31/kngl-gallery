<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNGLRP | Media Gallery Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ==========================================
           MODERN KARANLIK TEMA VE DEĞİŞKENLER
           ========================================== */
        :root {
            --bg-main: #0a0b10;
            --bg-card: #12141c;
            --bg-input: #1a1d29;
            --accent-green: #00ff87;
            --accent-orange: #ffaa00;
            --danger-red: #ff4a4a;
            --text-white: #ffffff;
            --text-gray: #8f9cae;
            --border-color: #1f2433;
            --shadow-glow: rgba(0, 255, 135, 0.15);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body { 
            background-color: var(--bg-main); 
            color: var(--text-white); 
            padding: 30px;
            overflow-x: hidden;
        }

        /* --- Üst Kontrol Paneli Tasarımı --- */
        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            gap: 15px;
            background: var(--bg-card);
            padding: 15px 25px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .search-box { 
            flex: 1; 
            padding: 14px 20px; 
            background: var(--bg-input); 
            border: 1px solid var(--border-color); 
            color: white; 
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        .search-box:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 10px var(--shadow-glow);
        }

        .user-info-zone {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* --- Buton Stilleri --- */
        .btn { 
            padding: 14px 24px; 
            border: none; 
            border-radius: 10px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .btn-primary { background: var(--accent-green); color: #050508; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0, 255, 135, 0.4); }
        
        .btn-danger { background: var(--danger-red); color: white; display: none; }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 74, 74, 0.4); }
        
        .btn-admin { background: #1a1d29; color: var(--text-gray); border: 1px solid var(--border-color); display: none; }
        .btn-admin.active { background: var(--accent-orange); color: #000; border-color: var(--accent-orange); box-shadow: 0 4px 15px rgba(255, 170, 0, 0.3); }

        .btn-auth { background: #25293a; color: white; border: 1px solid var(--border-color); }
        .btn-auth:hover { background: #32374e; }

        /* --- 5'li Medya Grid Düzeni --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 60px;
        }

        @media (max-width: 1200px) { .gallery-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 900px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 600px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }

        .media-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .media-card:hover { transform: translateY(-5px); border-color: #3a435e; box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        .media-card img { width: 100%; height: 200px; object-fit: cover; display: block; transition: transform 0.5s; }
        .media-card:hover img { transform: scale(1.03); }
        
        /* --- Gelişmiş Seçim Arayüzü --- */
        .card-checkbox { position: absolute; top: 12px; left: 12px; width: 22px; height: 22px; display: none; z-index: 10; cursor: pointer; accent-color: var(--accent-orange); }
        .media-card.selected { border-color: var(--accent-orange); box-shadow: 0 0 15px rgba(255,170,0,0.4); }

        /* --- Modern Premium Modallar --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(3, 4, 7, 0.85); display: none; place-items: center; z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: var(--bg-card); padding: 35px; border-radius: 24px; width: 480px; border: 1px solid var(--border-color); position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.6); animation: modalFadeIn 0.3s ease-out; }
        @keyframes modalFadeIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-close-btn { position: absolute; top: 20px; right: 20px; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-gray); cursor: pointer; display: grid; place-items: center; transition: all 0.2s; font-size: 20px; font-weight: bold; }
        .modal-close-btn:hover { background: var(--danger-red); color: white; border-color: var(--danger-red); }

        textarea, .modal-content input { width: 100%; padding: 14px; margin: 10px 0; background: var(--bg-input); border: 1px solid var(--border-color); color: white; border-radius: 10px; font-size: 14px; outline: none; transition: 0.2s; }
        textarea:focus, .modal-content input:focus { border-color: var(--accent-green); }
        textarea { height: 110px; resize: none; }

        /* --- Giriş Yapmadan Görünmesin Switch Tasarımı --- */
        .switch-container { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin: 15px 0; 
            padding: 12px 16px; 
            background: var(--bg-input);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }
        .switch { position: relative; display: inline-block; width: 48px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #25293a; transition: .3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-green); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* --- Sağ Alt Premium Terminal Log Paneli --- */
        #logger {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 400px;
            height: 250px;
            background: rgba(10, 11, 16, 0.96);
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 11px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            z-index: 10000;
            display: none;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
        }

        .log-info { color: #00ffff; }       
        .log-success { color: var(--accent-green); }    
        .log-error { color: var(--danger-red); }      
        .log-upload { color: var(--accent-orange); }     
        .log-delete { color: #ff00ff; }     
        .log-warning { color: #ffff00; }    

        #logger::-webkit-scrollbar { width: 6px; }
        #logger::-webkit-scrollbar-track { background: transparent; }
        #logger::-webkit-scrollbar-thumb { background: #2c3247; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <input type="text" id="searchInput" class="search-box" placeholder="Etiketlerde arama yapın (örn: car, lspd, y2k)...">
        
        <div class="user-info-zone">
            <button class="btn btn-auth" id="loginBtn" onclick="document.getElementById('authModal').style.display='grid'">Giriş Yap</button>
            <button class="btn btn-auth" id="logoutBtn" style="display:none;" onclick="handleLogout()">Çıkış Yap</button>
        </div>

        <button class="btn btn-admin" id="adminToggleBtn">Admin Modu: KAPALI</button>
        <button class="btn btn-danger" id="bulkDeleteBtn">Seçilenleri Sil (0)</button>
        <button class="btn btn-primary" id="addMediaBtn" style="display: none;" onclick="document.getElementById('uploadModal').style.display='grid'">Görsel Ekle</button>
    </div>

    <main id="galleryGrid" class="gallery-grid"></main>
    <div id="loading" style="text-align:center; padding:30px; display:none; color: var(--text-gray); font-weight: bold;">Daha fazla içerik senkronize ediliyor...</div>

    <div id="authModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-btn" onclick="document.getElementById('authModal').style.display='none'">&times;</button>
            <h3 style="margin-bottom: 20px; font-weight: 800; letter-spacing: -0.5px;">Sistem Giriş Şifresi</h3>
            
            <input type="password" id="authPassword" placeholder="Giriş Şifresini Yazın">
            
            <button id="authPrimaryBtn" class="btn btn-primary" style="width:100%; margin-top:15px; justify-content: center;" onclick="handlePasswordAuth()">Sisteme Giriş Yap</button>
        </div>
    </div>

    <div id="uploadModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-btn" onclick="document.getElementById('uploadModal').style.display='none'">&times;</button>
            <h3 style="margin-bottom: 20px; font-weight: 800; letter-spacing: -0.5px;">Medyaları Galeriye Aktar</h3>
            
            <label style="font-size:12px; color:var(--text-gray); font-weight: 600;">Dosya Yükle (Storage):</label>
            <input type="file" id="fileInput" multiple>
            
            <label style="font-size:12px; color:var(--text-gray); margin-top:12px; display:block; font-weight: 600;">Veya Doğrudan URL Adresleri (Satır satır):</label>
            <textarea id="linkArea" placeholder="https://site.com/image1.jpg&#10;https://site.com/image2.png"></textarea>
            
            <input type="text" id="tagInput" placeholder="Sistem etiketleri girin (örn: lspd, customs)">
            
            <div class="switch-container">
                <span style="font-size: 13px; color: var(--text-white); font-weight: 600;">Giriş yapmadan gözükmesin</span>
                <label class="switch">
                    <input type="checkbox" id="requireAuthCheck">
                    <span class="slider"></span>
                </label>
            </div>

            <button id="startUploadBtn" class="btn btn-primary" style="width:100%; margin-top:15px; justify-content: center;">Yükleme Sırasını Başlat</button>
        </div>
    </div>

    <div id="logger"></div>

    <script>
        // ==========================================
        // 1. SUPABASE CONFIG & GLOBAL VARIABLES
        // ==========================================
        const SUPABASE_URL = 'SENIN_SUPABASE_URL'; 
        const SUPABASE_KEY = 'SENIN_ANON_KEY';
        const ACCESS_PASSWORD = 'cc1312'; // Sadece bu şifreyi girenler admin olur ve gizli resimleri görür.

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allGalleryData = []; 
        let filteredData = [];   
        let displayedCount = 0;  
        const itemsPerScroll = 20; 
        let isAdminActive = false; 
        let isLoggedIn = false;

        const galleryGrid = document.getElementById('galleryGrid');
        const loadingIdx = document.getElementById('loading');
        const logger = document.getElementById('logger');
        const adminToggleBtn = document.getElementById('adminToggleBtn');
        const bulkDeleteBtn = document.getElementById('bulkDeleteBtn');
        const addMediaBtn = document.getElementById('addMediaBtn');

        // ==========================================
        // 2. DETAYLI TERMİNAL LOG SİSTEMİ
        // ==========================================
        function addLog(msg, type = 'info') {
            if (!logger) return;
            logger.style.display = 'block';

            const time = new Date().toLocaleTimeString();
            let className = 'log-info';
            let icon = '⚙️ [SİSTEM]';

            switch (type) {
                case 'success': className = 'log-success'; icon = '✅ [BAŞARILI]'; break;
                case 'error': className = 'log-error'; icon = '❌ [HATA]'; break;
                case 'upload': className = 'log-upload'; icon = '📤 [YÜKLEME]'; break;
                case 'delete': className = 'log-delete'; icon = '🗑️ [SİLME]'; break;
                case 'warning': className = 'log-warning'; icon = '⚠️ [UYARI]'; break;
            }

            const logRow = document.createElement('div');
            logRow.className = `log-row ${className}`;
            logRow.style.padding = '6px 12px';
            logRow.style.borderBottom = '1px solid #1a1d29';
            logRow.style.whiteSpace = 'pre-wrap';
            logRow.style.wordBreak = 'break-all';
            
            logRow.innerHTML = `
                <span style="color: #4e566d; margin-right: 6px;">[${time}]</span>
                <strong style="margin-right: 6px;">${icon}</strong> 
                <span>${msg}</span>
            `;

            logger.appendChild(logRow);
            logger.scrollTop = logger.scrollHeight;
        }

        // Sayfa Yüklenirken Oturum Kontrolü yap
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('gallery_session') === 'active') {
                updateLoginState(true);
            } else {
                updateLoginState(false);
            }
        });

        // ==========================================
        // 3. TEK ŞİFRELİ GİRİŞ SİSTEMİ VE UI YÖNETİMİ
        // ==========================================
        function handlePasswordAuth() {
            const inputPass = document.getElementById('authPassword').value;

            if (inputPass === ACCESS_PASSWORD) {
                localStorage.setItem('gallery_session', 'active');
                updateLoginState(true);
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('authPassword').value = '';
                addLog('Doğru şifre girildi. Yönetici hakları ve gizli arşiv açıldı.', 'success');
            } else {
                alert('Hatalı Şifre girdiniz!');
                addLog('Hatalı şifre denemesi yapıldı.', 'error');
            }
        }

        function handleLogout() {
            localStorage.removeItem('gallery_session');
            updateLoginState(false);
            addLog('Oturum kapatıldı, gizli arşiv kilitlendi.', 'warning');
        }

        function updateLoginState(loggedIn) {
            isLoggedIn = loggedIn;
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');

            if (loggedIn) {
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
                adminToggleBtn.style.display = 'block';
                addMediaBtn.style.display = 'block';
            } else {
                loginBtn.style.display = 'block';
                logoutBtn.style.display = 'none';
                adminToggleBtn.style.display = 'none';
                addMediaBtn.style.display = 'none';
                disableAdminUI();
            }

            fetchInitialData();
        }

        function disableAdminUI() {
            isAdminActive = false;
            adminToggleBtn.textContent = "Admin Modu: KAPALI";
            adminToggleBtn.classList.remove('active');
            syncAdminUIWithCards();
            updateBulkDeleteButtonUI();
        }

        // ==========================================
        // 4. VERİ ÇEKME VE GRID MOTORU
        // ==========================================
        async function fetchInitialData() {
            if (!galleryGrid) return;
            
            const { data, error } = await supabase
                .from('gallery_images')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                addLog('Veritabanı bağlantı hatası: ' + error.message, 'error');
                return;
            }

            let rawData = data || [];

            // GÜVENLİK AYARI: Giriş yapılmadıysa require_auth: true olanları gizle
            if (!isLoggedIn) {
                allGalleryData = rawData.filter(item => item.require_auth !== true);
            } else {
                allGalleryData = rawData;
            }

            filteredData = [...allGalleryData];
            galleryGrid.innerHTML = '';
            displayedCount = 0;
            loadMoreBatch();
            addLog(`${filteredData.length} adet aktif görsel listelendi.`, 'success');
        }

        function loadMoreBatch() {
            const nextBatch = filteredData.slice(displayedCount, displayedCount + itemsPerScroll);
            
            if(nextBatch.length === 0 && displayedCount === 0) {
                galleryGrid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-gray); padding:40px; font-weight:600;">Görüntülenecek görsel bulunamadı.</p>';
                return;
            }

            nextBatch.forEach(item => {
                const card = document.createElement('div');
                card.className = 'media-card';
                card.setAttribute('data-id', item.id);

                card.innerHTML = `
                    <input type="checkbox" class="card-checkbox" value="${item.id}" style="display: ${isAdminActive ? 'block' : 'none'}">
                    <img src="${item.image_url}" loading="lazy">
                `;

                card.addEventListener('click', (e) => {
                    const checkbox = card.querySelector('.card-checkbox');
                    
                    if (isAdminActive) {
                        e.preventDefault();
                        if (e.target !== checkbox) {
                            checkbox.checked = !checkbox.checked;
                        }
                        card.classList.toggle('selected', checkbox.checked);
                        updateBulkDeleteButtonUI();
                    } else {
                        window.open(item.image_url, '_blank');
                    }
                });

                const cbEl = card.querySelector('.card-checkbox');
                if(cbEl) {
                    cbEl.addEventListener('click', (e) => {
                        e.stopPropagation(); 
                        card.classList.toggle('selected', e.target.checked);
                        updateBulkDeleteButtonUI();
                    });
                }

                galleryGrid.appendChild(card);
            });

            displayedCount += nextBatch.length;
            if(loadingIdx) loadingIdx.style.display = 'none';
        }

        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 400) {
                if (displayedCount < filteredData.length && loadingIdx && loadingIdx.style.display !== 'block') {
                    loadingIdx.style.display = 'block';
                    loadMoreBatch();
                }
            }
        };

        const searchInp = document.getElementById('searchInput');
        if(searchInp) {
            searchInp.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                filteredData = allGalleryData.filter(item => 
                    item.tags && item.tags.toLowerCase().includes(term)
                );
                if(galleryGrid) galleryGrid.innerHTML = '';
                displayedCount = 0;
                loadMoreBatch();
            });
        }

        // ==========================================
        // 5. MEDYA EKLEME & STORAGE YÜKLEME
        // ==========================================
        const upBtn = document.getElementById('startUploadBtn');
        if(upBtn) {
            upBtn.onclick = async () => {
                const fileInput = document.getElementById('fileInput');
                const linkArea = document.getElementById('linkArea');
                const tagInput = document.getElementById('tagInput');
                const requireAuth = document.getElementById('requireAuthCheck').checked;

                const tags = tagInput.value.trim();
                const links = linkArea.value.split('\n').filter(l => l.trim() !== '');
                const files = fileInput.files;

                if (!tags) return alert('Lütfen en az bir etiket girin.');
                if (links.length === 0 && files.length === 0) return alert('Yüklenecek kaynak bulunamadı.');
                
                document.getElementById('uploadModal').style.display = 'none';
                addLog(`Kuyruk işleniyor... [Giriş Şartı Koruma Modu: ${requireAuth ? 'AKTİF' : 'PASİF'}]`, 'upload');

                for (let url of links) {
                    const { error } = await supabase.from('gallery_images').insert([{ 
                        image_url: url.trim(), 
                        tags: tags,
                        require_auth: requireAuth 
                    }]);
                    if (error) addLog(`Link entegrasyon hatası: ${error.message}`, 'error');
                    else addLog(`Uzak link arşive işlendi: ${url.substring(0,30)}...`, 'success');
                }

                for (let file of files) {
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                    const { error: upErr } = await supabase.storage.from('gallery').upload(fileName, file);
                    
                    if (upErr) {
                        addLog(`Storage Transfer Hatası (${file.name}): ${upErr.message}`, 'error');
                    } else {
                        const { data } = supabase.storage.from('gallery').getPublicUrl(fileName);
                        await supabase.from('gallery_images').insert([{ 
                            image_url: data.publicUrl, 
                            tags: tags,
                            require_auth: requireAuth 
                        }]);
                        addLog(`Dosya başarıyla depolandı ve indekslendi: ${file.name}`, 'success');
                    }
                }
                
                if(fileInput) fileInput.value = ''; 
                if(linkArea) linkArea.value = ''; 
                if(tagInput) tagInput.value = '';
                document.getElementById('requireAuthCheck').checked = false;
                
                await fetchInitialData();
            };
        }

        // ==========================================
        // 6. ADMIN MODU & TOPLU SİLME AKSİYONLARI
        // ==========================================
        if(adminToggleBtn) {
            adminToggleBtn.onclick = () => {
                if (!isLoggedIn) return;
                
                isAdminActive = !isAdminActive;
                adminToggleBtn.textContent = isAdminActive ? "Admin Modu: AKTİF" : "Admin Modu: KAPALI";
                adminToggleBtn.classList.toggle('active', isAdminActive);
                syncAdminUIWithCards();
                updateBulkDeleteButtonUI();
                addLog(`Yönetici yetki modu: ${isAdminActive ? 'ETKİNLEŞTİRİLDİ' : 'DEAKTİF'}`, 'warning');
            };
        }

        function syncAdminUIWithCards() {
            const checkboxes = document.querySelectorAll('.card-checkbox');
            checkboxes.forEach(cb => {
                cb.style.display = isAdminActive ? 'block' : 'none';
                if (!isAdminActive) {
                    cb.checked = false;
                    cb.closest('.media-card').classList.remove('selected');
                }
            });
        }

        function updateBulkDeleteButtonUI() {
            const selectedCount = document.querySelectorAll('.card-checkbox:checked').length;
            if(bulkDeleteBtn) {
                bulkDeleteBtn.textContent = `Seçilenleri Sil (${selectedCount})`;
                bulkDeleteBtn.style.display = (isAdminActive && selectedCount > 0) ? 'flex' : 'none';
            }
        }

        if(bulkDeleteBtn) {
            bulkDeleteBtn.onclick = async () => {
                const checkedBoxes = document.querySelectorAll('.card-checkbox:checked');
                if(checkedBoxes.length === 0) return;

                if(!confirm(`Seçtiğiniz ${checkedBoxes.length} adet görseli sistemden kalıcı olarak silmek istiyor musunuz?`)) return;

                const idsToDelete = Array.from(checkedBoxes).map(cb => cb.value);
                addLog(`${idsToDelete.length} adet görsel için kaldırma sinyali gönderildi...`, 'delete');

                const { error } = await supabase.from('gallery_images').delete().in('id', idsToDelete);

                if(error) {
                    addLog(`Kalıcı silme işlemi başarısız: ${error.message}`, 'error');
                } else {
                    addLog(`Seçilen ${idsToDelete.length} adet görsel veritabanından temizlendi.`, 'success');
                    
                    idsToDelete.forEach(id => {
                        const cardToRemove = document.querySelector(`.media-card[data-id="${id}"]`);
                        if (cardToRemove) cardToRemove.remove();
                    });
                    
                    allGalleryData = allGalleryData.filter(item => !idsToDelete.includes(item.id.toString()));
                    filteredData = filteredData.filter(item => !idsToDelete.includes(item.id.toString()));
                    displayedCount -= idsToDelete.length;
                    
                    updateBulkDeleteButtonUI();
                }
            };
        }
    </script>
</body>
</html>
