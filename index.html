<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNGLRP | Premium Media Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-darker: #050508;
            --bg-main: #0a0b10;
            --bg-card: #11131a;
            --bg-input: #171a24;
            --accent-green: #00ff87; /* Neon Yeşil */
            --accent-glow: rgba(0, 255, 135, 0.2);
            --text-white: #ffffff;
            --text-gray: #8f9cae;
            --border-color: #1f2433;
            --danger-red: #ff4a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-white);
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- SİBERPUNK ARKA PLAN EFEKTİ --- */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 80% 20%, rgba(0, 255, 135, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 24px;
            position: relative;
            z-index: 1;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 24px;
            gap: 20px;
        }

        .logo-area h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .logo-area h1 span {
            color: var(--accent-green);
            text-shadow: 0 0 15px var(--accent-glow);
            font-family: 'JetBrains Mono', monospace;
        }

        .controls-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* --- INPUTS & BUTTONS --- */
        input {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-white);
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        #searchInput {
            width: 300px;
        }

        button {
            background-color: var(--accent-green);
            color: var(--bg-darker);
            font-size: 14px;
            font-weight: 700;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--accent-glow);
        }

        button.btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-white);
        }

        button.btn-secondary:hover {
            background-color: var(--bg-input);
            border-color: var(--text-gray);
            box-shadow: none;
        }

        button.btn-danger {
            background-color: transparent;
            border: 1px solid var(--danger-red);
            color: var(--danger-red);
        }

        button.btn-danger:hover {
            background-color: var(--danger-red);
            color: var(--text-white);
            box-shadow: 0 5px 15px rgba(255, 74, 74, 0.2);
        }

        /* --- YÜKLEME PANELİ (YETKİLİ GİRİŞİ YAPILDIĞINDA AÇILIR) --- */
        #uploadSection {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 40px;
            display: none; /* JS ile açılır */
        }

        #uploadSection h2 {
            font-size: 20px;
            margin-bottom: 24px;
            font-weight: 700;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .upload-grid { grid-template-columns: 1fr; }
        }

        .drop-zone {
            border: 2px dashed var(--border-color);
            background-color: var(--bg-darker);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-gray);
            font-size: 14px;
            text-align: center;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-green);
            background-color: var(--bg-input);
            color: var(--text-white);
        }

        .form-right {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
        }

        .divider-text {
            text-align: center;
            color: var(--text-gray);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* --- MODERN GİRİŞ MODAL (POPUP) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5, 5, 8, 0.85);
            backdrop-filter: blur(10px);
            z-index: 999;
            display: none; /* Sadece JS tetiklediğinde görünür */
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
            animation: modalFade 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes modalFade {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-content h2 {
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .modal-content p {
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .modal-close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: transparent;
            border: none;
            color: var(--text-gray);
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
        }
        .modal-close-btn:hover { color: white; }

        /* --- GALERİ GRID SİSTEMİ --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .media-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .media-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent-green);
            box-shadow: 0 12px 30px rgba(0, 255, 135, 0.05);
        }

        .img-container {
            width: 100%;
            height: 240px;
            overflow: hidden;
            background-color: var(--bg-darker);
            position: relative;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .media-card:hover .img-container img {
            transform: scale(1.05);
        }

        .card-footer {
            padding: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid var(--border-color);
        }

        .tag {
            background-color: var(--bg-input);
            color: var(--text-gray);
            font-size: 12px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-family: 'JetBrains Mono', monospace;
        }

        @media (max-width: 650px) {
            header { flex-direction: column; align-items: stretch; }
            .controls-area { flex-direction: column; align-items: stretch; }
            #searchInput { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-area">
                <h1>KNGLRP <span>Gallery</span></h1>
            </div>
            <div class="controls-area">
                <input type="text" id="searchInput" placeholder="Tag araması yap...">
                <button id="showLoginBtn" class="btn-secondary">Yetkili Girişi</button>
                <button id="logoutBtn" class="btn-danger" style="display: none;">Oturumu Kapat</button>
            </div>
        </header>

        <section id="uploadSection">
            <h2>Yeni Galeri İçeriği Yayınla</h2>
            <div class="upload-grid">
                <div id="dropZone" class="drop-zone">
                    <span id="dropZoneText">Görsel sürükleyin veya tıklayıp dosyadan seçin</span>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                </div>
                <div class="form-right">
                    <div class="divider-text">Veya Doğrudan Link</div>
                    <input type="text" id="linkInput" placeholder="Görsel adresi (URL) yapıştırın...">
                    <input type="text" id="tagInput" placeholder="Etiketler (virgülle ayırın: lspd, illegal, car)">
                    <button id="uploadBtn">Galeriye Gönder</button>
                </div>
            </div>
            <p id="uploadStatus" style="margin-top: 16px; font-size: 14px; font-weight: 600;"></p>
        </section>

        <main id="galleryGrid" class="gallery-grid">
            </main>
    </div>

    <div id="loginModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-btn" id="closeModalBtn">&times;</button>
            <h2>Erişim Doğrulaması</h2>
            <p>Galeri yönetim paneline erişmek için kodu girin.</p>
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <input type="password" id="passwordInput" placeholder="Giriş kodunu yazın..." style="width: 100%;">
                <button id="loginBtn" style="width: 100%; justify-content: center;">Paneli Aç</button>
            </div>
            <p id="loginError" style="color: var(--danger-red); display: none; margin-top: 14px; font-size: 14px; font-weight: 600; text-align: center;">Hatalı Erişim Kodu!</p>
        </div>
    </div>

    <script>
        // --- 1. CONFIG ---
        const SUPABASE_URL = 'https://rqtlwqphwfjlysnwkpel.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxdGx3cXBod2ZqbHlzbndrcGVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDEyNzIsImV4cCI6MjA5ODkxNzI3Mn0.0Xx7BJe0O5VB5uZIZL8LCqOMTTWvSBnGKtGTY6kQGpY';
        
        let supabase = null;
        try {
            if (window.supabase && SUPABASE_URL !== 'SENIN_SUPABASE_URL_BURAYA') {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch(e) {
            console.error("Supabase yüklenemedi:", e);
        }

        // Element Tanımlamaları
        const galleryGrid = document.getElementById('galleryGrid');
        const searchInput = document.getElementById('searchInput');
        const uploadSection = document.getElementById('uploadSection');
        const showLoginBtn = document.getElementById('showLoginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginModal = document.getElementById('loginModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const dropZone = document.getElementById('dropZone');
        const dropZoneText = document.getElementById('dropZoneText');
        const fileInput = document.getElementById('fileInput');
        let selectedFile = null;

        // --- 2. YETKİLİ GİRİŞ / POPUP MANTIĞI (HATA ALMAZ) ---
        function checkSession() {
            const status = localStorage.getItem('knglrp_session') === 'active';
            if (status) {
                uploadSection.style.display = 'block';
                logoutBtn.style.display = 'inline-block';
                showLoginBtn.style.display = 'none';
            } else {
                uploadSection.style.display = 'none';
                logoutBtn.style.display = 'none';
                showLoginBtn.style.display = 'inline-block';
            }
        }

        // Yetkili Girişi Butonu -> Modalı Zorla Açar
        showLoginBtn.addEventListener('click', function() {
            loginError.style.display = 'none';
            passwordInput.value = '';
            loginModal.style.display = 'flex';
        });

        // Kapatma Butonu
        closeModalBtn.addEventListener('click', function() {
            loginModal.style.display = 'none';
        });

        // Dışarı tıklayınca kapatma
        window.addEventListener('click', function(e) {
            if (e.target === loginModal) {
                loginModal.style.display = 'none';
            }
        });

        // Kod Kontrolü
        loginBtn.addEventListener('click', function() {
            if (passwordInput.value === 'nieves1312') {
                localStorage.setItem('knglrp_session', 'active');
                loginError.style.display = 'none';
                loginModal.style.display = 'none';
                checkSession();
            } else {
                loginError.style.display = 'block';
            }
        });

        // Çıkış
        logoutBtn.addEventListener('click', function() {
            localStorage.removeItem('knglrp_session');
            checkSession();
        });

        // --- 3. VERİ ÇEKME ---
        async function fetchImages(searchQuery = '') {
            galleryGrid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-gray);">Veriler senkronize ediliyor...</p>';
            
            if (!supabase) {
                galleryGrid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--danger-red);">Supabase URL ve Key eksik ya da hatalı!</p>';
                return;
            }

            let query = supabase.from('gallery_images').select('*').order('created_at', { ascending: false });
            
            if (searchQuery) {
                query = query.ilike('tags', `%${searchQuery}%`);
            }

            const { data, error } = await query;

            if (error) {
                galleryGrid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--danger-red);">Veri Hatası: ${error.message}</p>`;
                return;
            }

            galleryGrid.innerHTML = '';
            
            if (!data || data.length === 0) {
                galleryGrid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-gray);">Gösterilebilecek medya kaydı bulunamadı.</p>';
                return;
            }

            data.forEach(item => {
                const tagsHtml = item.tags.split(',')
                    .map(t => t.trim() ? `<span class="tag">#${t.trim()}</span>` : '')
                    .join('');

                const card = document.createElement('div');
                card.className = 'media-card';
                card.innerHTML = `
                    <div class="img-container">
                        <img src="${item.image_url}" alt="KNGLRP Media" loading="lazy">
                    </div>
                    <div class="card-footer">${tagsHtml}</div>
                `;
                galleryGrid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => fetchImages(e.target.value));

        // --- 4. SÜRÜKLE BIRAK MEDYA SEÇİMİ ---
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                selectedFile = e.dataTransfer.files[0];
                dropZoneText.innerText = `Seçilen: ${selectedFile.name}`;
                dropZoneText.style.color = 'var(--accent-green)';
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                selectedFile = e.target.files[0];
                dropZoneText.innerText = `Seçilen: ${selectedFile.name}`;
                dropZoneText.style.color = 'var(--accent-green)';
            }
        });

        // --- 5. MEDYA YÜKLEME & SUPABASE DOCK ---
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const linkInput = document.getElementById('linkInput').value;
            const tags = document.getElementById('tagInput').value;
            const statusText = document.getElementById('uploadStatus');
            
            if (!supabase) return alert('Veritabanı bağlantısı yok.');
            if (!tags) return alert('Lütfen arama filtreleri için tag girin.');
            if (!selectedFile && !linkInput) return alert('Bir dosya seçin veya medya URL adresi girin.');

            statusText.style.color = 'var(--text-white)';
            statusText.innerText = "Bulut sunucusuna işleniyor...";
            
            let finalImageUrl = linkInput;

            if (selectedFile) {
                const fileExt = selectedFile.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                
                const { error: uploadError } = await supabase.storage
                    .from('gallery')
                    .upload(fileName, selectedFile);
                    
                if (uploadError) {
                    statusText.style.color = 'var(--danger-red)';
                    statusText.innerText = 'Storage Upload Hatası: ' + uploadError.message;
                    return;
                }

                const { data } = supabase.storage.from('gallery').getPublicUrl(fileName);
                finalImageUrl = data.publicUrl;
            }

            const { error: dbError } = await supabase.from('gallery_images').insert([
                { image_url: finalImageUrl, tags: tags }
            ]);

            if (dbError) {
                statusText.style.color = 'var(--danger-red)';
                statusText.innerText = 'Database Kayıt Hatası: ' + dbError.message;
            } else {
                statusText.style.color = 'var(--accent-green)';
                statusText.innerText = 'Medyalar başarıyla KNGLRP ağına yüklendi!';
                
                // Form Reset
                document.getElementById('linkInput').value = '';
                document.getElementById('tagInput').value = '';
                selectedFile = null;
                dropZoneText.innerText = 'Görsel sürükleyin veya tıklayıp dosyadan seçin';
                dropZoneText.style.color = 'var(--text-gray)';
                fileInput.value = '';
                
                setTimeout(() => statusText.innerText = '', 4000);
                fetchImages(); 
            }
        });

        // İlk Çalıştırma
        checkSession();
        fetchImages();
    </script>
</body>
</html>
