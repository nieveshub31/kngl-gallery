<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNGLRP | Resmi Galeri</title>
    <!-- Google Fonts & FontAwesome İkonları -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase Resmi Kütüphanesi -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #0f0f12;
            --panel-color: #16161e;
            --accent-color: #e50914;
            --accent-hover: #b80710;
            --text-color: #ffffff;
            --text-muted: #a0a0b0;
            --border-color: #282836;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; }
        header { background: linear-gradient(180deg, rgba(22,22,30,1) 0%, rgba(15,15,18,0) 100%); padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border-color); }
        header h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        header h1 span { color: var(--accent-color); text-shadow: 0 0 15px rgba(229, 9, 20, 0.4); }
        header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        
        .btn { background-color: var(--accent-color); color: #fff; border: none; padding: 10px 20px; font-size: 0.9rem; font-weight: 600; border-radius: 5px; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { background-color: var(--accent-hover); transform: translateY(-2px); }
        .btn-secondary { background-color: #282836; border: 1px solid var(--border-color); }
        .btn-secondary:hover { background-color: #3b3b50; }
        .btn-danger { background-color: #d32f2f; }
        .btn-danger:hover { background-color: #b71c1c; }

        .admin-panel { background-color: var(--panel-color); border: 1px solid var(--border-color); border-radius: 10px; padding: 25px; margin-bottom: 30px; display: none; }
        .panel-title { font-size: 1.2rem; margin-bottom: 20px; }
        
        .drop-zone { border: 2px dashed var(--accent-color); background-color: rgba(229, 9, 20, 0.03); border-radius: 8px; padding: 40px 20px; text-align: center; cursor: pointer; transition: background 0.3s; margin-bottom: 20px; }
        .drop-zone:hover, .drop-zone.drag-over { background-color: rgba(229, 9, 20, 0.1); }
        .drop-zone i { font-size: 3rem; color: var(--accent-color); margin-bottom: 10px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: var(--text-muted); }
        .form-control { width: 100%; background-color: var(--bg-color); border: 1px solid var(--border-color); color: #fff; padding: 12px; border-radius: 5px; outline: none; font-size: 0.9rem; }
        .form-control:focus { border-color: var(--accent-color); }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .gallery-item { background-color: var(--panel-color); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; position: relative; transition: transform 0.3s; }
        .gallery-item:hover { transform: translateY(-5px); }
        .image-container { width: 100%; height: 200px; overflow: hidden; position: relative; background-color: #000; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .select-checkbox { position: absolute; top: 10px; left: 10px; width: 20px; height: 20px; cursor: pointer; z-index: 10; accent-color: var(--accent-color); display: none; }
        .item-details { padding: 15px; }
        .item-desc { font-size: 0.9rem; color: #fff; word-wrap: break-word; margin-bottom: 10px; min-height: 24px; }
        .item-date { font-size: 0.75rem; color: var(--text-muted); }
        .item-actions { display: flex; justify-content: flex-end; margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 10px; }
        .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; }
        .btn-icon:hover { color: #d32f2f; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { background-color: var(--panel-color); border: 1px solid var(--border-color); padding: 30px; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; }
        .empty-message { grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 50px 0; font-style: italic; }
        
        /* Loading Animasyonu */
        .loading-spinner { display: none; text-align: center; margin: 20px 0; color: var(--accent-color); font-size: 1.5rem; }
    </style>
</head>
<body>

    <header>
        <h1><span>KNGL</span>RP</h1>
        <p>Resmi Şehir Galerisi & Görsel Arşivi</p>
    </header>

    <div class="container">
        <div class="action-bar">
            <div>
                <button class="btn" id="loginBtn" onclick="openLoginModal()"><i class="fa-solid fa-lock"></i> Yönetim Girişi</button>
                <button class="btn btn-secondary" id="logoutBtn" onclick="logoutAdmin()" style="display: none;"><i class="fa-solid fa-lock-open"></i> Çıkış Yap</button>
            </div>
            <div id="bulkDeleteActions" style="display: none;">
                <button class="btn btn-secondary" onclick="toggleBulkSelectMode(false)">İptal</button>
                <button class="btn btn-danger" onclick="deleteSelectedImages()"><i class="fa-solid fa-trash-can"></i> Seçilenleri Sil (<span id="selectCount">0</span>)</button>
            </div>
            <button class="btn btn-danger" id="bulkDeleteModeBtn" onclick="toggleBulkSelectMode(true)" style="display: none;"><i class="fa-solid fa-layer-group"></i> Toplu Silme Modu</button>
        </div>

        <!-- Yönetim Paneli -->
        <div class="admin-panel" id="adminPanel">
            <div class="panel-title"><span><i class="fa-solid fa-cloud-arrow-up"></i> Yeni Görsel Ekle</span></div>
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <i class="fa-solid fa-images"></i>
                <p>Görseli buraya sürükleyin veya <b>Göz Atın</b></p>
                <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
            </div>
            <div class="input-group">
                <label for="urlInput">Veya Görsel Linki (URL)</label>
                <input type="text" id="urlInput" class="form-control" placeholder="https://example.com/resim.png">
            </div>
            <div class="input-group">
                <label for="descInput">Görsel Açıklaması</label>
                <input type="text" id="descInput" class="form-control" placeholder="Görsel açıklaması yazın...">
            </div>
            <button class="btn" id="uploadSubmitBtn" onclick="uploadImage()" style="width: 100%; justify-content: center;"><i class="fa-solid fa-plus"></i> Galeriyi Güncelle</button>
            <div class="loading-spinner" id="loadingSpinner"><i class="fa-solid fa-spinner fa-spin"></i> Görsel Yükleniyor...</div>
        </div>

        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <!-- Şifre Giriş Modalı -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h3>Yönetici Girişi</h3>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 15px;">İşlem yapmak için şifreyi girin.</p>
            <div class="input-group"><input type="password" id="passwordInput" class="form-control" placeholder="Şifre"></div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-secondary" onclick="closeLoginModal()" style="flex: 1; justify-content: center;">İptal</button>
                <button class="btn" onclick="verifyPassword()" style="flex: 1; justify-content: center;">Giriş</button>
            </div>
        </div>
    </div>

    <script>
        // !!! KENDİ SUPABASE BİLGİLERİNİ BURAYA YAPIŞTIR !!!
        const SUPABASE_URL = "https://mmkusfynqosmvpsbwewc.supabase.co/rest/v1/";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ta3VzZnlucW9zbXZwc2J3ZXdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNzg0MzEsImV4cCI6MjA5ODc1NDQzMX0.pPtgFT_JdQaVqftGWTQxTUnulQ8WUNvrbdy5AG4jy-4";
        
        const ADMIN_PASSWORD = "nieves 1312";
        
        // Supabase İstemcisini Başlat
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isAdmin = false;
        let isBulkDeleteMode = false;
        let selectedItems = [];
        let tempBase64Image = "";

        window.onload = function() {
            fetchGalleryFromDatabase();
            setupDragAndDrop();
        };

        // Veritabanından Görselleri Çekme
        async function fetchGalleryFromDatabase() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = `<div class="empty-message"><i class="fa-solid fa-spinner fa-spin"></i> Görseller Yükleniyor...</div>`;

            let { data: gallery, error } = await supabase
                .from('gallery')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                grid.innerHTML = `<div class="empty-message" style="color:red;">Veriler alınırken hata oluştu!</div>`;
                return;
            }

            renderGallery(gallery);
        }

        // Drag & Drop İşlemleri
        function setupDragAndDrop() {
            const dropZone = document.getElementById('dropZone');
            ['dragenter', 'dragover'].forEach(n => dropZone.addEventListener(n, (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); }));
            ['dragleave', 'drop'].forEach(n => dropZone.addEventListener(n, (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); }));
            dropZone.addEventListener('drop', (e) => { if(e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]); });
        }

        function handleFileSelect(e) { if(e.target.files.length) processFile(e.target.files[0]); }

        function processFile(file) {
            if(!file.type.match('image.*')) { alert('Sadece görsel!'); return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                tempBase64Image = e.target.result;
                document.getElementById('dropZone').innerHTML = `<i class="fa-solid fa-check" style="color: #4caf50;"></i><p>${file.name} Hazır!</p>`;
            };
            reader.readAsDataURL(file);
        }

        function openLoginModal() { document.getElementById('loginModal').classList.add('active'); document.getElementById('passwordInput').focus(); }
        function closeLoginModal() { document.getElementById('loginModal').classList.remove('active'); document.getElementById('passwordInput').value = ""; }

        function verifyPassword() {
            if(document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
                isAdmin = true; closeLoginModal();
                document.getElementById('loginBtn').style.style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'inline-flex';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('bulkDeleteModeBtn').style.display = 'inline-flex';
                fetchGalleryFromDatabase();
            } else { alert('Hatalı Şifre!'); }
        }

        function logoutAdmin() {
            isAdmin = false; toggleBulkSelectMode(false);
            document.getElementById('loginBtn').style.display = 'inline-flex';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('bulkDeleteModeBtn').style.display = 'none';
            fetchGalleryFromDatabase();
        }

        // Veritabanına Görsel Yükleme
        async function uploadImage() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const descInput = document.getElementById('descInput').value.trim();
            let finalSrc = tempBase64Image || urlInput;

            if(!finalSrc) { alert('Görsel ekleyin!'); return; }

            // Loading durumunu aç
            document.getElementById('uploadSubmitBtn').style.display = 'none';
            document.getElementById('loadingSpinner').style.display = 'block';

            const dateStr = new Date().toLocaleDateString('tr-TR', { hour: '2-digit', minute:'2-digit' });

            const { error } = await supabase
                .from('gallery')
                .insert([{ src: finalSrc, description: descInput || "Açıklama belirtilmedi.", date_str: dateStr }]);

            document.getElementById('uploadSubmitBtn').style.display = 'block';
            document.getElementById('loadingSpinner').style.display = 'none';

            if(error) {
                alert('Yükleme hatası: ' + error.message);
            } else {
                document.getElementById('urlInput').value = "";
                document.getElementById('descInput').value = "";
                tempBase64Image = "";
                document.getElementById('dropZone').innerHTML = `<i class="fa-solid fa-images"></i><p>Görseli buraya sürükleyin veya <b>Göz Atın</b></p>`;
                fetchGalleryFromDatabase();
            }
        }

        function renderGallery(items) {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = "";

            if(!items || items.length === 0) {
                grid.innerHTML = `<div class="empty-message">Galeri henüz boş.</div>`;
                return;
            }

            items.forEach(item => {
                const isChecked = selectedItems.includes(item.id);
                const itemHtml = `
                    <div class="gallery-item" id="item-${item.id}">
                        <input type="checkbox" class="select-checkbox" style="display: ${isBulkDeleteMode ? 'block' : 'none'}" ${isChecked ? 'checked' : ''} onchange="handleSelectItem(${item.id})">
                        <div class="image-container">
                            <img src="${item.src}" onerror="this.src='https://placehold.co/600400/16161e/ffffff?text=Kırık+Link'">
                        </div>
                        <div class="item-details">
                            <p class="item-desc">${item.description}</p>
                            <span class="item-date"><i class="fa-regular fa-clock"></i> ${item.date_str || ''}</span>
                            ${isAdmin && !isBulkDeleteMode ? `
                                <div class="item-actions">
                                    <button class="btn-icon" onclick="deleteSingleImage(${item.id})"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', itemHtml);
            });
        }

        async function deleteSingleImage(id) {
            if(confirm('Silmek istediğinize emin misiniz?')) {
                const { error } = await supabase.from('gallery').delete().eq('id', id);
                if(error) alert(error.message);
                else fetchGalleryFromDatabase();
            }
        }

        function toggleBulkSelectMode(activate) {
            isBulkDeleteMode = activate; selectedItems = [];
            document.getElementById('selectCount').innerText = "0";
            document.getElementById('bulkDeleteModeBtn').style.display = activate ? 'none' : 'inline-flex';
            document.getElementById('bulkDeleteActions').style.display = activate ? 'flex' : 'none';
            fetchGalleryFromDatabase();
        }

        function handleSelectItem(id) {
            if(selectedItems.includes(id)) selectedItems = selectedItems.filter(i => i !== id);
            else selectedItems.push(id);
            document.getElementById('selectCount').innerText = selectedItems.length;
        }

        async function deleteSelectedImages() {
            if(!selectedItems.length) return;
            if(confirm('Seçilenleri silmek istediğinize emin misiniz?')) {
                const { error } = await supabase.from('gallery').delete().in('id', selectedItems);
                if(error) alert(error.message);
                else { toggleBulkSelectMode(false); fetchGalleryFromDatabase(); }
            }
        }
    </script>
</body>
</html>
