<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNGL RP | Los Santos Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            background-color: #0d0e12;
            background-image: radial-gradient(circle at 50% 0%, #1f1235 0%, #0d0e12 70%);
        }
        .neon-border { box-shadow: 0 0 15px rgba(139, 92, 246, 0.15); }
        .gallery-card img { transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .gallery-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="text-gray-100 min-h-screen font-sans antialiased">

    <div id="admin-badge" class="bg-purple-900 text-purple-200 text-center text-xs py-1 hidden font-semibold tracking-wider">
        YÖNETİCİ MODU AKTİF • <button onclick="logout()" class="underline hover:text-white">Çıkış Yap</button>
    </div>

    <header class="border-b border-purple-900/40 bg-black/40 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-fuchsia-500 to-pink-500">
                    KNGL RP
                </span>
                <span class="text-xs bg-purple-900/60 border border-purple-500/30 text-purple-300 px-2 py-0.5 rounded-full uppercase font-semibold tracking-widest">
                    LOS SANTOS
                </span>
            </div>
            <button id="action-btn" onclick="openAdminModal()" class="text-sm text-gray-400 hover:text-purple-400 transition-colors border border-gray-800 hover:border-purple-500/40 px-3 py-1.5 rounded-lg bg-gray-900/50">
                Resim Yükle
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="text-center mb-16">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-white">Şehir Günlükleri & Galeri</h1>
            <p class="text-gray-400 max-w-xl mx-auto text-sm">Los Santos sokaklarından en özel anlar ve unutulmaz anılar.</p>
        </div>

        <div id="loading" class="flex justify-center items-center py-20">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-purple-500"></div>
        </div>

        <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 hidden"></div>

        <div id="pagination-container" class="flex flex-col sm:flex-row justify-center items-center space-y-4 sm:space-y-0 sm:space-x-4 mt-16 hidden">
            <button id="prev-btn" onclick="changePage(-1)" class="w-full sm:w-auto px-4 py-2 bg-gray-900 border border-purple-950/60 hover:border-purple-500/50 rounded-xl text-sm font-medium transition-all disabled:opacity-30 disabled:pointer-events-none">
                ← Önceki
            </button>
            <div id="page-numbers" class="flex items-center space-x-2 overflow-x-auto max-w-full px-2 py-1"></div>
            <button id="next-btn" onclick="changePage(1)" class="w-full sm:w-auto px-4 py-2 bg-gray-900 border border-purple-950/60 hover:border-purple-500/50 rounded-xl text-sm font-medium transition-all disabled:opacity-30 disabled:pointer-events-none">
                Sonraki →
            </button>
        </div>

        <div id="no-images" class="text-center py-20 hidden">
            <p class="text-gray-500 text-lg">Henüz şehirden bir fotoğraf paylaşılmadı.</p>
        </div>
    </main>

    <div id="image-modal" class="fixed inset-0 bg-black/95 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm" onclick="closeModal()">
        <button class="absolute top-6 right-6 text-white text-3xl">&times;</button>
        <div class="max-w-5xl w-full max-h-[85vh] flex flex-col items-center" onclick="event.stopPropagation()">
            <img id="modal-img" src="" class="max-w-full max-h-[75vh] object-contain rounded-lg shadow-2xl">
            <p id="modal-caption" class="text-gray-300 text-lg mt-4 font-medium tracking-wide"></p>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm" onclick="closeAdminModal()">
        <div class="max-w-md w-full bg-gray-950 border border-purple-950 p-8 rounded-2xl shadow-2xl" onclick="event.stopPropagation()">
            
            <div id="login-section">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-bold text-white">Yönetici Girişi</h2>
                </div>
                <div class="space-y-4">
                    <input type="password" id="admin-password" placeholder="Erişim Şifresi" class="w-full bg-gray-900 border border-gray-800 focus:border-purple-500 rounded-xl px-4 py-3 text-white focus:outline-none">
                    <button onclick="checkPassword()" class="w-full bg-gradient-to-r from-purple-600 to-fuchsia-600 font-semibold text-white py-3 rounded-xl">Giriş Yap</button>
                    <p id="login-error" class="text-red-500 text-xs text-center hidden">Hatalı şifre girdiniz!</p>
                </div>
            </div>

            <div id="upload-section" class="hidden">
                <div class="mb-6">
                    <h2 class="text-2xl font-bold text-white">Toplu Fotoğraf Ekle</h2>
                </div>
                <div class="space-y-5">
                    <div class="flex bg-gray-900 p-1 rounded-xl border border-gray-800">
                        <button onclick="switchUploadMethod('file')" id="btn-method-file" class="flex-1 py-2 text-xs font-semibold rounded-lg bg-purple-600 text-white">Çoklu Dosya Yükle</button>
                        <button onclick="switchUploadMethod('url')" id="btn-method-url" class="flex-1 py-2 text-xs font-semibold rounded-lg text-gray-400">Çoklu URL Yapıştır</button>
                    </div>

                    <div id="input-file-container" class="space-y-2">
                        <label class="block text-xs font-semibold text-gray-400 uppercase">Görselleri Seç (Birden fazla seçebilirsiniz)</label>
                        <input type="file" id="img-file" accept="image/*" multiple class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-2.5 text-sm text-gray-400">
                    </div>

                    <div id="input-url-container" class="space-y-2 hidden">
                        <label class="block text-xs font-semibold text-gray-400 uppercase">Resim URL Adresleri (Her satıra bir link gelecek şekilde)</label>
                        <textarea id="img-url" rows="4" placeholder="https://link1.com&#10;https://link2.com" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none text-sm font-mono"></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Ortak Açıklama (İsteğe Bağlı)</label>
                        <input type="text" id="img-caption" placeholder="Tüm bu görseller için ortak açıklama" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none text-sm">
                        <p class="text-gray-500 text-[10px] mt-1">Boş bırakırsanız sadece fotoğraflar yüklenir.</p>
                    </div>

                    <div id="upload-progress" class="text-xs text-purple-400 font-semibold text-center hidden py-1 bg-purple-950/20 border border-purple-900/30 rounded-lg">
                        Yükleniyor: <span id="progress-text">0 / 0</span>
                    </div>

                    <button onclick="submitBatchImages()" id="submit-btn" class="w-full bg-gradient-to-r from-purple-600 to-fuchsia-600 font-semibold text-white py-3 rounded-xl shadow-lg disabled:opacity-50">Galeriye Ekle</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const PASSPHRASE = "NİEVES1312"; 
        
        // 🔑 ANAHTARLARINI BURAYA YENİDEN YAZ:
        const SUPABASE_URL = "https://mmkusfynqosmvpsbwewc.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ta3VzZnlucW9zbXZwc2J3ZXdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNzg0MzEsImV4cCI6MjA5ODc1NDQzMX0.pPtgFT_JdQaVqftGWTQxTUnulQ8WUNvrbdy5AG4jy-4"; 
        const IMGBB_KEY = "b465ee87375e9aabe31f96eeb810e227";

        let allImages = [];
        let currentPage = 1;
        const itemsPerPage = 20; 
        let activeMethod = 'file';

        document.addEventListener("DOMContentLoaded", fetchGalleryData);

        async function fetchGalleryData() {
            const loadingEl = document.getElementById('loading');
            const noImagesEl = document.getElementById('no-images');
            const galleryEl = document.getElementById('gallery');
            const paginationEl = document.getElementById('pagination-container');

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/gallery?select=*&order=created_at.desc`, {
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                if (res.ok) {
                    allImages = await res.json();
                } else {
                    console.error("Veri çekme hatası:", await res.text());
                    allImages = [];
                }

                loadingEl.classList.add('hidden');

                if (allImages.length === 0) {
                    noImagesEl.classList.remove('hidden');
                    galleryEl.classList.add('hidden');
                    paginationEl.classList.add('hidden');
                    return;
                }

                noImagesEl.classList.add('hidden');
                renderPage();
            } catch (error) {
                console.error("Ağ Hatası:", error);
                loadingEl.innerHTML = `<p class="text-red-400 text-sm p-4 bg-red-950/20 border border-red-900/50 rounded-xl">Bağlantı kurulamadı.</p>`;
            }
        }

        function renderPage() {
            const galleryEl = document.getElementById('gallery');
            const isAdmin = sessionStorage.getItem('kngl_logged') === 'true';

            galleryEl.innerHTML = '';

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageItems = allImages.slice(startIndex, endIndex);

            pageItems.forEach((img) => {
                if(!img || !img.url) return;
                const card = document.createElement('div');
                card.className = "gallery-card relative bg-gray-950/40 border border-purple-950/60 rounded-xl overflow-hidden cursor-pointer neon-border hover:border-purple-500/50 transition-all duration-300 transform hover:-translate-y-1";
                
                card.addEventListener('click', (e) => {
                    if (!e.target.closest('.delete-btn')) {
                        openModal(img.url, img.caption || "");
                    }
                });
                
                card.innerHTML = `
                    ${isAdmin ? `
                        <button data-id="${img.id}" class="delete-btn absolute top-3 right-3 z-10 bg-red-600/90 hover:bg-red-700 text-white p-2 rounded-lg border border-red-500 shadow-lg" title="Sil">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    ` : ''}
                    <div class="aspect-video w-full overflow-hidden bg-gray-900 flex items-center justify-center">
                        <img src="${img.url}" class="w-full h-full object-cover" loading="lazy" onerror="this.src='https://placehold.co/600x400/1a102f/ffffff?text=Resim+Yuklenemedi'">
                    </div>
                    ${img.caption ? `<div class="p-4 border-t border-purple-950/40 bg-black/20"><p class="text-sm text-gray-300 font-medium truncate">${img.caption}</p></div>` : ''}
                `;
                galleryEl.appendChild(card);
            });

            if (isAdmin) {
                document.querySelectorAll('.delete-btn').forEach(button => {
                    button.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = button.getAttribute('data-id');
                        deleteImage(id);
                    });
                });
                showAdminInterface();
            }

            galleryEl.classList.remove('hidden');
            updatePaginationControls();
        }

        function updatePaginationControls() {
            const paginationEl = document.getElementById('pagination-container');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const pageNumbersEl = document.getElementById('page-numbers');

            const totalPages = Math.ceil(allImages.length / itemsPerPage);

            if (totalPages <= 1) {
                paginationEl.classList.add('hidden');
                return;
            }

            paginationEl.classList.remove('hidden');
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;

            pageNumbersEl.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                if (i === currentPage) {
                    btn.className = "px-3.5 py-1.5 bg-purple-600 border border-purple-500 text-white rounded-lg text-sm font-bold shadow-lg transition-all";
                } else {
                    btn.className = "px-3.5 py-1.5 bg-gray-950 border border-purple-950/60 text-gray-400 hover:text-purple-400 hover:border-purple-500/30 rounded-lg text-sm font-medium transition-all";
                }
                btn.onclick = () => {
                    currentPage = i;
                    renderPage();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                pageNumbersEl.appendChild(btn);
            }
        }

        function changePage(direction) {
            currentPage += direction;
            renderPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteImage(id) {
            if (!confirm("Bu fotoğrafı kalıcı olarak silmek istiyor musunuz?")) return;
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/gallery?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`
                    }
                });
                if(res.ok) {
                    allImages = allImages.filter(img => img.id != id);
                    const totalPages = Math.ceil(allImages.length / itemsPerPage);
                    if (currentPage > totalPages && currentPage > 1) {
                        currentPage = totalPages;
                    }
                    renderPage();
                } else {
                    alert("Silme hatası: " + await res.text());
                }
            } catch (error) {
                alert("Silme sırasında bağlantı hatası oluştu.");
            }
        }

        function switchUploadMethod(method) {
            activeMethod = method;
            const btnFile = document.getElementById('btn-method-file');
            const btnUrl = document.getElementById('btn-method-url');
            const inputFile = document.getElementById('input-file-container');
            const inputUrl = document.getElementById('input-url-container');
            if(method === 'file') {
                btnFile.className = "flex-1 py-2 text-xs font-semibold rounded-lg bg-purple-600 text-white";
                btnUrl.className = "flex-1 py-2 text-xs font-semibold rounded-lg text-gray-400";
                inputFile.classList.remove('hidden');
                inputUrl.classList.add('hidden');
            } else {
                btnUrl.className = "flex-1 py-2 text-xs font-semibold rounded-lg bg-purple-600 text-white";
                btnFile.className = "flex-1 py-2 text-xs font-semibold rounded-lg text-gray-400";
                inputUrl.classList.remove('hidden');
                inputFile.classList.add('hidden');
            }
        }

        function openAdminModal() {
            document.getElementById('admin-modal').classList.remove('hidden');
            if (sessionStorage.getItem('kngl_logged') === 'true') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('upload-section').classList.remove('hidden');
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('upload-section').classList.add('hidden');
            }
        }

        function checkPassword() {
            if (document.getElementById('admin-password').value === PASSPHRASE) {
                sessionStorage.setItem('kngl_logged', 'true');
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('upload-section').classList.remove('hidden');
                showAdminInterface();
                renderPage();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function showAdminInterface() {
            document.getElementById('admin-badge').classList.remove('hidden');
            document.getElementById('action-btn').innerText = "Fotoğraf Ekle";
        }

        function logout() { sessionStorage.removeItem('kngl_logged'); location.reload(); }
        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); }
        function openModal(url, caption) {
            document.getElementById('modal-img').src = url;
            document.getElementById('modal-caption').innerText = caption;
            document.getElementById('image-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('image-modal').classList.add('hidden'); }

        // 🔥 TOPLU RESİM YÜKLEME FONKSİYONU
        async function submitBatchImages() {
            const fileInput = document.getElementById('img-file');
            const urlInput = document.getElementById('img-url');
            const captionInput = document.getElementById('img-caption');
            const btn = document.getElementById('submit-btn');
            const progressContainer = document.getElementById('upload-progress');
            const progressText = document.getElementById('progress-text');
            const caption = captionInput.value.trim();
            
            let urlsToUpload = [];

            btn.disabled = true;

            try {
                if (activeMethod === 'file') {
                    const files = fileInput.files;
                    if (files.length === 0) { alert("Lütfen en az bir dosya seçin!"); resetButton(); return; }

                    progressContainer.classList.remove('hidden');
                    progressText.innerText = `0 / ${files.length} (Dosyalar sunucuya gönderiliyor...)`;

                    // Dosyaları sırayla ImgBB'ye yükle
                    for (let i = 0; i < files.length; i++) {
                        progressText.innerText = `${i} / ${files.length} - Dosya yükleniyor...`;
                        const formData = new FormData();
                        formData.append("image", files[i]);

                        const uploadRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                            method: "POST",
                            body: formData
                        });

                        if (uploadRes.ok) {
                            const uploadData = await uploadRes.json();
                            if (uploadData.success) {
                                urlsToUpload.push(uploadData.data.url);
                            }
                        }
                    }
                } else {
                    // Textarea'daki linkleri satır satır böl, temizle ve boş olanları ele
                    const rawLinks = urlInput.value.split('\n');
                    urlsToUpload = rawLinks.map(link => link.trim()).filter(link => link.startsWith('http'));
                    if (urlsToUpload.length === 0) { alert("Lütfen geçerli URL adresleri girin!"); resetButton(); return; }
                }

                if(urlsToUpload.length === 0) {
                    alert("Yüklenecek görsel bulunamadı veya sunucu hatası oluştu.");
                    resetButton();
                    return;
                }

                progressText.innerText = `Veritabanına kaydediliyor...`;

                // Supabase'e toplu (bulk) ekleme işlemi yapıyoruz (Tek istekte tüm listeyi yazar)
                const payload = urlsToUpload.map(url => ({ url: url, caption: caption }));

                const dbRes = await fetch(`${SUPABASE_URL}/rest/v1/gallery`, {
                    method: 'POST',
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=representation"
                    },
                    body: JSON.stringify(payload)
                });

                if(!dbRes.ok) {
                    alert("Görseller yüklendi ancak veritabanına kaydedilirken hata oluştu.");
                    resetButton();
                    return;
                }

                // Inputları temizle
                fileInput.value = ''; urlInput.value = ''; captionInput.value = '';
                closeAdminModal();
                
                // Yeni eklenen tüm resimleri listenin en başına koy ve 1. sayfayı yenile
                const newImgs = await dbRes.json();
                allImages = [...newImgs, ...allImages];
                currentPage = 1;
                renderPage();
                
                alert(`${urlsToUpload.length} adet görsel başarıyla galeriye eklendi!`);

            } catch (error) {
                alert("Toplu yükleme sırasında hata oluştu: " + error.message);
            } finally {
                resetButton();
            }

            function resetButton() { 
                btn.disabled = false; 
                btn.innerText = "Galeriye Ekle"; 
                progressContainer.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
