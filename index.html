<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNGLRP | Media Gallery Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-main: #050508;
            --bg-card: #11131a;
            --accent-green: #00ff87;
            --danger-red: #ff4a4a;
            --text-white: #ffffff;
            --text-gray: #8f9cae;
            --border-color: #1f2433;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-main); color: var(--text-white); font-family: sans-serif; padding: 20px; }

        /* Üst Bar Kontrolleri */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; }
        .search-box { flex: 1; padding: 12px; background: var(--bg-card); border: 1px solid var(--border-color); color: white; border-radius: 8px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--accent-green); color: #000; }
        .btn-danger { background: var(--danger-red); color: white; display: none; }
        .btn-admin { background: #171a24; color: white; border: 1px solid var(--border-color); }
        .btn-admin.active { background: #ffaa00; color: black; }

        /* 5'li Grid Düzeni (Aşağı indikçe sütun sütun yüklenecek) */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 50px;
        }

        .media-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .media-card:hover { transform: translateY(-3px); }
        .media-card img { width: 100%; height: 180px; object-fit: cover; display: block; }
        
        /* Seçim ve Checkbox Alanı */
        .card-checkbox { position: absolute; top: 10px; left: 10px; width: 20px; height: 20px; display: none; z-index: 10; cursor: pointer; }
        .media-card.selected { border-color: #ffaa00; box-shadow: 0 0 10px rgba(255,170,0,0.3); }

        /* Modal Tasarımları */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; place-items: center; z-index: 9999; }
        .modal-content { background: var(--bg-card); padding: 30px; border-radius: 20px; width: 450px; border: 1px solid var(--border-color); position: relative; }
        
        /* İstediğin Yuvarlak Çarpı Butonu */
        .modal-close-btn { 
            position: absolute; top: 15px; right: 15px; width: 32px; height: 32px; 
            border-radius: 50%; border: 1px solid var(--border-color); background: #171a24;
            color: white; cursor: pointer; display: grid; place-items: center; transition: 0.3s;
            font-size: 18px;
        }
        .modal-close-btn:hover { background: var(--danger-red); color: white; }

        textarea, .modal-content input { width: 100%; padding: 12px; margin: 8px 0; background: #171a24; border: 1px solid var(--border-color); color: white; border-radius: 8px; }
        textarea { height: 100px; resize: none; }

        /* Özel İstenen Giriş Yapmadan Görünmesin Ayarı Switch Tasarımı */
        .switch-container { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; padding: 5px 0; }
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #171a24; border: 1px solid var(--border-color); transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-green); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Sağ Alt Detaylı Canlı Geliştirici Konsolu */
        #logger {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            height: 240px;
            background: rgba(5, 5, 8, 0.95);
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 11px;
            overflow-y: auto;
            border: 1px solid #1f2433;
            border-radius: 12px;
            z-index: 10000;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
        }

        /* Log Türlerinin Özel Renkleri */
        .log-info { color: #00ffff; }       
        .log-success { color: #00ff87; }    
        .log-error { color: #ff4a4a; }      
        .log-upload { color: #ffaa00; }     
        .log-delete { color: #ff00ff; }     
        .log-warning { color: #ffff00; }    

        #logger::-webkit-scrollbar { width: 6px; }
        #logger::-webkit-scrollbar-track { background: #050508; }
        #logger::-webkit-scrollbar-thumb { background: #1f2433; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <input type="text" id="searchInput" class="search-box" placeholder="Etiketlerde ara (örn: car, lspd)...">
        <button class="btn btn-admin" id="adminToggleBtn">Admin Modu: KAPALI</button>
        <button class="btn btn-danger" id="bulkDeleteBtn">Seçilenleri Sil (0)</button>
        <button class="btn btn-primary" onclick="document.getElementById('uploadModal').style.display='grid'">Görsel Ekle</button>
    </div>

    <main id="galleryGrid" class="gallery-grid"></main>
    <div id="loading" style="text-align:center; padding:20px; display:none; color: var(--text-gray);">Daha fazla görsel yükleniyor...</div>

    <div id="uploadModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-btn" onclick="document.getElementById('uploadModal').style.display='none'">&times;</button>
            <h3 style="margin-bottom: 15px;">Medyaları Sisteme Ekle</h3>
            
            <label style="font-size:12px; color:var(--text-gray);">Dosya Yükle (Çoklu Seçilebilir):</label>
            <input type="file" id="fileInput" multiple>
            
            <label style="font-size:12px; color:var(--text-gray); margin-top:10px; display:block;">Veya Resim Linkleri (Satır satır):</label>
            <textarea id="linkArea" placeholder="https://site.com/resim1.jpg&#10;https://site.com/resim2.png"></textarea>
            
            <input type="text" id="tagInput" placeholder="Etiketler (örn: car, lspd)">
            
            <div class="switch-container">
                <span style="font-size: 13px; color: var(--text-white);">Giriş yapmadan gözükmesin</span>
                <label class="switch">
                    <input type="checkbox" id="requireAuthCheck">
                    <span class="slider"></span>
                </label>
            </div>

            <button id="startUploadBtn" class="btn btn-primary" style="width:100%; margin-top:10px;">Yüklemeyi Başlat</button>
        </div>
    </div>

    <div id="logger"></div>

    <script>
        // ==========================================
        // 1. SUPABASE AYARLARI
        // ==========================================
        const SUPABASE_URL = 'https://rqtlwqphwfjlysnwkpel.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxdGx3cXBod2ZqbHlzbndrcGVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDEyNzIsImV4cCI6MjA5ODkxNzI3Mn0.0Xx7BJe0O5VB5uZIZL8LCqOMTTWvSBnGKtGTY6kQGpY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allGalleryData = []; 
        let filteredData = [];   
        let displayedCount = 0;  
        const itemsPerScroll = 20; 
        let isAdminActive = false; 

        const galleryGrid = document.getElementById('galleryGrid');
        const loadingIdx = document.getElementById('loading');
        const logger = document.getElementById('logger');
        const adminToggleBtn = document.getElementById('adminToggleBtn');
        const bulkDeleteBtn = document.getElementById('bulkDeleteBtn');

        // ==========================================
        // 2. DETAYLI TERMİNAL LOG FONKSİYONU
        // ==========================================
        function addLog(msg, type = 'info') {
            if (!logger) return;
            logger.style.display = 'block';

            const time = new Date().toLocaleTimeString();
            let className = 'log-info';
            let icon = '⚙️ [SİSTEM]';

            switch (type) {
                case 'success': className = 'log-success'; icon = '✅ [BAŞARILI]'; break;
                case 'error': className = 'log-error'; icon = '❌ [HATA]'; break;
                case 'upload': className = 'log-upload'; icon = '📤 [YÜKLEME]'; break;
                case 'delete': className = 'log-delete'; icon = '🗑️ [SİLME]'; break;
                case 'warning': className = 'log-warning'; icon = '⚠️ [UYARI]'; break;
            }

            const logRow = document.createElement('div');
            logRow.className = `log-row ${className}`;
            logRow.style.padding = '4px 8px';
            logRow.style.borderBottom = '1px solid #11131a';
            logRow.style.whiteSpace = 'pre-wrap';
            logRow.style.wordBreak = 'break-all';
            
            logRow.innerHTML = `
                <span style="color: #555; margin-right: 5px;">[${time}]</span>
                <strong style="margin-right: 5px;">${icon}</strong> 
                <span>${msg}</span>
            `;

            logger.appendChild(logRow);
            logger.scrollTop = logger.scrollHeight;

            if (logger.children.length > 100) {
                logger.removeChild(logger.firstChild);
            }
        }

        // Sayfa İlk Açıldığında Verileri Getirme
        document.addEventListener('DOMContentLoaded', fetchInitialData);

        async function fetchInitialData() {
            if (!galleryGrid) return;
            
            const { data, error } = await supabase
                .from('gallery_images')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                addLog('Veritabanı bağlantı hatası: ' + error.message, 'error');
                return;
            }

            allGalleryData = data || [];
            filteredData = [...allGalleryData];
            
            galleryGrid.innerHTML = '';
            displayedCount = 0;
            loadMoreBatch();
            addLog(`${allGalleryData.length} adet medya havuzdan başarıyla senkronize edildi.`, 'success');
        }

        // ==========================================
        // 3. SÜTUN SÜTUN YÜKLEME VE SEÇME MANTIĞI
        // ==========================================
        function loadMoreBatch() {
            const nextBatch = filteredData.slice(displayedCount, displayedCount + itemsPerScroll);
            
            if(nextBatch.length === 0 && displayedCount === 0) {
                galleryGrid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-gray); padding:40px;">Görsel bulunamadı.</p>';
                return;
            }

            nextBatch.forEach(item => {
                const card = document.createElement('div');
                card.className = 'media-card';
                card.setAttribute('data-id', item.id);

                card.innerHTML = `
                    <input type="checkbox" class="card-checkbox" value="${item.id}" style="display: ${isAdminActive ? 'block' : 'none'}">
                    <img src="${item.image_url}" loading="lazy">
                `;

                // Tıklama Yönetimi (İstediğin net ayrım)
                card.addEventListener('click', (e) => {
                    const checkbox = card.querySelector('.card-checkbox');
                    
                    if (isAdminActive) {
                        // Admin Modundaysa: Resmi büyük açmaz, tıklandığı gibi seçer
                        e.preventDefault();
                        if (e.target !== checkbox) {
                            checkbox.checked = !checkbox.checked;
                        }
                        card.classList.toggle('selected', checkbox.checked);
                        updateBulkDeleteButtonUI();
                    } else {
                        // Normal Kullanıcı: Resmi yeni sekmede tam ekran açar
                        window.open(item.image_url, '_blank');
                    }
                });

                // Checkbox çakışma önleyici
                const cbEl = card.querySelector('.card-checkbox');
                if(cbEl) {
                    cbEl.addEventListener('click', (e) => {
                        e.stopPropagation(); 
                        card.classList.toggle('selected', e.target.checked);
                        updateBulkDeleteButtonUI();
                    });
                }

                galleryGrid.appendChild(card);
            });

            displayedCount += nextBatch.length;
            if(loadingIdx) loadingIdx.style.display = 'none';
        }

        // Sonsuz Kaydırma Kontrolü (Aşağı kaydırdıkça tetiklenir)
        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 400) {
                if (displayedCount < filteredData.length && loadingIdx && loadingIdx.style.display !== 'block') {
                    loadingIdx.style.display = 'block';
                    loadMoreBatch();
                }
            }
        };

        // Gelişmiş Filtreleme / Arama Motoru
        const searchInp = document.getElementById('searchInput');
        if(searchInp) {
            searchInp.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                filteredData = allGalleryData.filter(item => 
                    item.tags && item.tags.toLowerCase().includes(term)
                );
                if(galleryGrid) galleryGrid.innerHTML = '';
                displayedCount = 0;
                loadMoreBatch();
            });
        }

        // ==========================================
        // 4. ÇOKLU EKLEME VE ÖZEL AYAR KAYDI
        // ==========================================
        const upBtn = document.getElementById('startUploadBtn');
        if(upBtn) {
            upBtn.onclick = async () => {
                const fileInput = document.getElementById('fileInput');
                const linkArea = document.getElementById('linkArea');
                const tagInput = document.getElementById('tagInput');
                const requireAuth = document.getElementById('requireAuthCheck').checked; // Giriş yapmadan gözükmesin değeri

                const tags = tagInput.value.trim();
                const links = linkArea.value.split('\n').filter(l => l.trim() !== '');
                const files = fileInput.files;

                if (!tags) return alert('Lütfen en az bir etiket girin.');
                if (links.length === 0 && files.length === 0) return alert('Yüklenecek dosya veya link girilmedi.');
                
                document.getElementById('uploadModal').style.display = 'none';
                addLog(`Kuyruk işleniyor... (Giriş Şartı: ${requireAuth ? 'EVET' : 'HAYIR'})`, 'upload');

                // 1. Çoklu Link İşleme
                for (let url of links) {
                    const { error } = await supabase.from('gallery_images').insert([{ 
                        image_url: url.trim(), 
                        tags: tags,
                        require_auth: requireAuth  // Tablondaki auth alanına göre kaydeder
                    }]);
                    if (error) addLog(`Link kayıt hatası: ${error.message}`, 'error');
                    else addLog(`Link havuzuna eklendi: ${url.substring(0,25)}...`, 'success');
                }

                // 2. Çoklu Dosya İşleme (Storage -> Database)
                for (let file of files) {
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                    const { error: upErr } = await supabase.storage.from('gallery').upload(fileName, file);
                    
                    if (upErr) {
                        addLog(`Storage Hatası (${file.name}): ${upErr.message}`, 'error');
                    } else {
                        const { data } = supabase.storage.from('gallery').getPublicUrl(fileName);
                        await supabase.from('gallery_images').insert([{ 
                            image_url: data.publicUrl, 
                            tags: tags,
                            require_auth: requireAuth 
                        }]);
                        addLog(`Dosya başarıyla yüklendi ve ilişkilendirildi: ${file.name}`, 'success');
                    }
                }
                
                // Formları sıfırla
                if(fileInput) fileInput.value = ''; 
                if(linkArea) linkArea.value = ''; 
                if(tagInput) tagInput.value = '';
                document.getElementById('requireAuthCheck').checked = false;
                
                await fetchInitialData();
            };
        }

        // ==========================================
        // 5. TOPLU SİLME VE TERMİNAL ENTEGRASYONU
        // ==========================================
        if(adminToggleBtn) {
            adminToggleBtn.onclick = () => {
                isAdminActive = !isAdminActive;
                adminToggleBtn.textContent = isAdminActive ? "Admin Modu: AKTİF" : "Admin Modu: KAPALI";
                adminToggleBtn.classList.toggle('active', isAdminActive);
                syncAdminUIWithCards();
                updateBulkDeleteButtonUI();
                addLog(`Yönetici yetki modu: ${isAdminActive ? 'ETKİN' : 'DEVRE DIŞI'}`, 'warning');
            };
        }

        function syncAdminUIWithCards() {
            const checkboxes = document.querySelectorAll('.card-checkbox');
            checkboxes.forEach(cb => {
                cb.style.display = isAdminActive ? 'block' : 'none';
                if (!isAdminActive) {
                    cb.checked = false;
                    cb.closest('.media-card').classList.remove('selected');
                }
            });
        }

        function updateBulkDeleteButtonUI() {
            const selectedCount = document.querySelectorAll('.card-checkbox:checked').length;
            if(bulkDeleteBtn) {
                bulkDeleteBtn.textContent = `Seçilenleri Sil (${selectedCount})`;
                bulkDeleteBtn.style.display = (isAdminActive && selectedCount > 0) ? 'block' : 'none';
            }
        }

        if(bulkDeleteBtn) {
            bulkDeleteBtn.onclick = async () => {
                const checkedBoxes = document.querySelectorAll('.card-checkbox:checked');
                if(checkedBoxes.length === 0) return;

                if(!confirm(`Seçtiğiniz ${checkedBoxes.length} adet görseli sistemden kalıcı olarak silmek istiyor musunuz?`)) return;

                const idsToDelete = Array.from(checkedBoxes).map(cb => cb.value);
                addLog(`${idsToDelete.length} adet veri temizleniyor...`, 'delete');

                const { error } = await supabase.from('gallery_images').delete().in('id', idsToDelete);

                if(error) {
                    addLog(`Temizleme hatası: ${error.message}`, 'error');
                } else {
                    addLog(`Seçilen tüm veriler (${idsToDelete.length} öge) başarıyla temizlendi.`, 'success');
                    
                    idsToDelete.forEach(id => {
                        const cardToRemove = document.querySelector(`.media-card[data-id="${id}"]`);
                        if (cardToRemove) cardToRemove.remove();
                    });
                    
                    allGalleryData = allGalleryData.filter(item => !idsToDelete.includes(item.id.toString()));
                    filteredData = filteredData.filter(item => !idsToDelete.includes(item.id.toString()));
                    displayedCount -= idsToDelete.length;
                    updateBulkDeleteButtonUI();
                }
            };
        }
    </script>
</body>
</html>
