<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiveM Sunucu Galerisi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Sunucu Galerisi</h1>
        <input type="text" id="searchInput" placeholder="Etikete göre ara (örn: lspd, çete)...">
        <button id="adminLoginBtn">Yetkili Girişi</button>
    </header>

    <section id="uploadSection" style="display: none;">
        <h2>Yeni Görsel Yükle</h2>
        
        <div id="dropZone" class="drop-zone">
            Dosyayı buraya sürükle-bırak veya seçmek için tıkla
            <input type="file" id="fileInput" accept="image/*" hidden>
        </div>
        
        <p>VEYA</p>
        <input type="text" id="linkInput" placeholder="Görsel linki yapıştır...">
        
        <input type="text" id="tagInput" placeholder="Etiketler (virgülle ayırın, örn: arac, modifiye)...">
        <button id="uploadBtn">Görseli Galeriye Ekle</button>
    </section>

    <main id="galleryGrid" class="grid-container">
        </main>

    <script type="module" src="app.js"></script>
</body>
</html>
