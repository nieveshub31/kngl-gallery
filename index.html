<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNGLRP | Premium Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-main: #0b0c10;
            --bg-surface: #14161d;
            --bg-input: #1f222b;
            --accent: #10b981; 
            --accent-hover: #059669;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --danger: #ef4444;
            --border: #2d313f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        header h1 span {
            color: var(--accent);
            -webkit-text-fill-color: initial;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input {
            padding: 12px 16px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
            width: 100%;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        #searchInput {
            width: 260px;
        }

        button {
            padding: 12px 20px;
            background-color: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        button:hover { 
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }
        
        button.secondary {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }
        button.secondary:hover {
            background-color: var(--bg-input);
        }
        
        button.danger { 
            background-color: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        button.danger:hover { 
            background-color: var(--danger);
            color: #fff;
        }

        #loginSection, #uploadSection {
            background-color: var(--bg-surface);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 40px;
            max-width: 500px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.3s ease;
        }

        #uploadSection {
            max-width: 600px;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            padding: 35px 20px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            background-color: var(--bg-main);
            transition: all 0.2s ease;
            color: var(--text-muted);
            font-size: 14px;
        }

        .drop-zone:hover, .drop-zone.dragover { 
            border-color: var(--accent);
            background-color: var(--bg-input);
            color: var(--text-main);
        }

        .divider {
            text-align: center;
            margin: 5px 0;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        .card {
            background-color: var(--bg-surface);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: #4b5563;
            box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.5);
        }

        .card-image-wrapper {
            position: relative;
            width: 100%;
            height: 230px;
            background-color: var(--bg-main);
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover img {
            transform: scale(1.03);
        }

        .tags {
            padding: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .tag-badge {
            background-color: var(--bg-input);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--border);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            #searchInput { width: 100%; }
            header { flex-direction: column; align-items: flex-start; }
            .header-controls { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>KNGLRP <span>Gallery</span></h1>
            <div class="header-controls">
                <input type="text" id="searchInput" placeholder="Tag ara (örn: lspd, illegal)...">
                <button id="showLoginBtn" class="secondary">Yetkili Girişi</button>
                <button id="logoutBtn" class="danger" style="display: none;">Çıkış Yap</button>
            </div>
        </header>

        <section id="loginSection" style="display: none;">
            <h2>Yetkili Şifresi</h2>
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Erişim kodunu girin...">
                <button id="loginBtn">Onayla</button>
            </div>
            <p id="loginError" style="color: var(--danger); display: none; margin-top: 12px; font-size: 14px;">Hatalı erişim kodu!</p>
        </section>

        <section id="uploadSection" style="display: none;">
            <h2>Galeriye Yeni Medya Ekle</h2>
            
            <div class="input-group">
                <div id="dropZone" class="drop-zone">
                    <span>Görseli buraya sürükleyin veya tıklayıp seçin</span>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                </div>
                
                <div class="divider">VEYA LİNK İLE</div>
                
                <input type="text" id="linkInput" placeholder="Görsel URL adresini yapıştırın...">
                <input type="text" id="tagInput" placeholder="Tag'ler (virgülle ayırın: lspd, devriye, gece)">
                
                <button id="uploadBtn">Yayınla</button>
            </div>
            <p id="uploadStatus" style="margin-top: 12px; font-size: 14px; font-weight: 500;"></p>
        </section>

        <main id="galleryGrid" class="grid-container">
            </main>
    </div>

    <script>
        // 1. SUPABASE BİLGİLERİNİ BURAYA YAPIŞTIRIN
        const SUPABASE_URL = 'https://rqtlwqphwfjlysnwkpel.supabase.co/';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxdGx3cXBod2ZqbHlzbndrcGVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDEyNzIsImV4cCI6MjA5ODkxNzI3Mn0.0Xx7BJe0O5VB5uZIZL8LCqOMTTWvSBnGKtGTY6kQGpY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Elementler
        const galleryGrid = document.getElementById('galleryGrid');
        const searchInput = document.getElementById('searchInput');
        const loginSection = document.getElementById('loginSection');
        const uploadSection = document.getElementById('uploadSection');
        const showLoginBtn = document.getElementById('showLoginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        let selectedFile = null;

        // --- GALERİ ÇEKME VE FİLTRELEME ---
        async function fetchImages(searchQuery = '') {
            galleryGrid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-muted);">Medyalar yükleniyor...</p>';
            
            let query = supabase.from('gallery_images').select('*').order('created_at', { ascending: false });
            
            if (searchQuery) {
                query = query.ilike('tags', `%${searchQuery}%`);
            }

            const { data, error } = await query;

            if (error) {
                galleryGrid.innerHTML = `<p style="color:var(--danger); grid-column:1/-1; text-align:center;">Hata: ${error.message}</p>`;
                return;
            }

            galleryGrid.innerHTML = '';
            
            if (!data || data.length === 0) {
                galleryGrid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-muted);">Görsel bulunamadı.</p>';
                return;
            }

            data.forEach(item => {
                const tagsHtml = item.tags.split(',')
                    .map(tag => tag.trim() ? `<span class="tag-badge">#${tag.trim()}</span>` : '')
                    .join('');

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-image-wrapper">
                        <img src="${item.image_url}" alt="KNGLRP" loading="lazy">
                    </div>
                    <div class="tags">${tagsHtml}</div>
                `;
                galleryGrid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => fetchImages(e.target.value));

        // --- BASİT KOD DOĞRULAMA (nieves1312) ---
        // Oturumu tarayıcı hafızasında (sessionStorage) tutuyoruz, sayfa yenilenene kadar açık kalır.
        function checkLocalAuth() {
            if (sessionStorage.getItem('isKnglrpAdmin') === 'true') {
                uploadSection.style.display = 'block';
                showLoginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                loginSection.style.display = 'none';
            } else {
                uploadSection.style.display = 'none';
                showLoginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
            }
        }

        showLoginBtn.addEventListener('click', () => {
            loginSection.style.display = loginSection.style.display === 'none' ? 'block' : 'none';
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            const password = document.getElementById('passwordInput').value;
            const errEl = document.getElementById('loginError');
            
            if (password === 'nieves1312') {
                errEl.style.display = 'none';
                sessionStorage.setItem('isKnglrpAdmin', 'true');
                document.getElementById('passwordInput').value = '';
                checkLocalAuth();
            } else {
                errEl.style.display = 'block';
            }
        });

        logoutBtn.addEventListener('click', () => {
            sessionStorage.removeItem('isKnglrpAdmin');
            checkLocalAuth();
        });

        // --- MEDYA YÜKLEME İŞLEMLERİ ---
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                selectedFile = e.dataTransfer.files[0];
                dropZone.querySelector('span').innerText = `Seçildi: ${selectedFile.name}`;
                dropZone.querySelector('span').style.color = 'var(--accent)';
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                selectedFile = e.target.files[0];
                dropZone.querySelector('span').innerText = `Seçildi: ${selectedFile.name}`;
                dropZone.querySelector('span').style.color = 'var(--accent)';
            }
        });

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const linkInput = document.getElementById('linkInput').value;
            const tags = document.getElementById('tagInput').value;
            const statusText = document.getElementById('uploadStatus');
            
            if (!tags) return alert('Lütfen en az bir tag yazın!');
            if (!selectedFile && !linkInput) return alert('Dosya yükleyin veya link girin!');

            statusText.style.color = 'var(--text-main)';
            statusText.innerText = "İşlem yapılıyor...";
            
            let finalImageUrl = linkInput;

            if (selectedFile) {
                const fileExt = selectedFile.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                
                const { error: uploadError } = await supabase.storage
                    .from('gallery')
                    .upload(fileName, selectedFile);
                    
                if (uploadError) {
                    statusText.style.color = 'var(--danger)';
                    statusText.innerText = 'Yükleme Hatası: ' + uploadError.message;
                    return;
                }

                const { data } = supabase.storage.from('gallery').getPublicUrl(fileName);
                finalImageUrl = data.publicUrl;
            }

            const { error: dbError } = await supabase.from('gallery_images').insert([
                { image_url: finalImageUrl, tags: tags }
            ]);

            if (dbError) {
                statusText.style.color = 'var(--danger)';
                statusText.innerText = 'Veritabanı Hatası: ' + dbError.message;
            } else {
                statusText.style.color = 'var(--accent)';
                statusText.innerText = 'Görsel başarıyla KNGLRP galerisine eklendi!';
                
                document.getElementById('linkInput').value = '';
                document.getElementById('tagInput').value = '';
                selectedFile = null;
                dropZone.querySelector('span').innerText = 'Görseli buraya sürükleyin veya tıklayıp seçin';
                dropZone.querySelector('span').style.color = 'var(--text-muted)';
                fileInput.value = '';
                
                setTimeout(() => statusText.innerText = '', 4000);
                fetchImages(); 
            }
        });

        // Sayfa ilk açıldığında tetiklenenler
        checkLocalAuth();
        fetchImages();
    </script>
</body>
</html>
